async function sbFetch(method, table, query, body) {
  const url = `${SB_URL}/rest/v1/${table}${query?"?"+query:""}`;
  const opts = { method, headers: { "apikey":SB_KEY, "Authorization":"Bearer "+SB_KEY, "Content-Type":"application/json", "Prefer":"return=representation" } };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const res = await fetch(url, opts);
  const text = await res.text();
  if (!res.ok) throw new Error(text || res.statusText);
  if (!text || text==="null") return [];
  try { return JSON.parse(text); } catch { return []; }
}

const dbGet    = (t,q)    => sbFetch("GET",    t, q);
const dbInsert = (t,data) => sbFetch("POST",   t, "", data);
const dbUpdate = (t,m,d)  => sbFetch("PATCH",  t, Object.entries(m).map(([k,v])=>`${k}=eq.${encodeURIComponent(v)}`).join("&"), d);
const dbDelete = (t,m)    => sbFetch("DELETE", t, Object.entries(m).map(([k,v])=>`${k}=eq.${encodeURIComponent(v)}`).join("&"));

function uid()      { return Math.random().toString(36).slice(2)+Date.now().toString(36); }

// ── CONNECTION CHECK ───────────────────────────────────────────────────────────
function ConnectCheck({ onReady }) {
  const [st,setSt]=useState("checking"); const [err,setErr]=useState("");
  async function check(){
    setSt("checking"); setErr("");
    try{ await dbGet("admin","select=id&limit=1"); setSt("ok"); setTimeout(()=>onReady(),600); }
    catch(e){ setSt("error"); setErr(e.message); }
  }
  useEffect(()=>{check();},[]);
  if(st==="ok") return <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:"#080810",flexDirection:"column",gap:12}}><div style={{fontSize:40}}>✅</div><div style={{color:"#22c55e",fontWeight:700,fontSize:18}}>Connected!</div></div>;
  if(st==="checking") return <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:"#080810",flexDirection:"column",gap:16}}><div style={{width:40,height:40,border:"3px solid rgba(99,102,241,.3)",borderTop:"3px solid #a78bfa",borderRadius:"50%",animation:"spin 1s linear infinite"}}/><div style={{color:"#6b7280",fontSize:15}}>Connecting to database...</div></div>;
  return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:"#080810",flexDirection:"column",gap:16,padding:24}}>
      <div style={{fontSize:40}}>❌</div>
      <div style={{color:"#ef4444",fontWeight:700,fontSize:20}}>Connection Failed</div>
      <div style={{color:"#9ca3af",fontSize:13,maxWidth:420,textAlign:"center",lineHeight:1.8}}>{err}</div>
      <button onClick={check} style={{background:"linear-gradient(135deg,#6366f1,#8b5cf6)",border:"none",borderRadius:8,padding:"11px 32px",color:"#fff",fontWeight:700,fontSize:15,cursor:"pointer"}}>Retry Connection</button>
    </div>
  );
}

// ── ROOT ──────────────────────────────────────────────────────────────────────
function App() {
  const [ready,setReady]=useState(false); const [session,setSession]=useState(null); const [screen,setScreen]=useState("home");
  function logout(){ setSession(null); setScreen("home"); }
  if(!ready) return <ConnectCheck onReady={()=>setReady(true)}/>;
  if(session?.role==="admin")     return <AdminDashboard onLogout={logout}/>;
  if(session?.role==="candidate") return <CandidateDashboard user={session.user} onLogout={logout}/>;
  return (
    <div style={S.root}>
      {screen==="home"      && <Home onAdmin={()=>setScreen("admin")} onCandidate={()=>setScreen("candidate")}/>}
      {screen==="admin"     && <Login role="admin"     onBack={()=>setScreen("home")} onLogin={()=>setSession({role:"admin"})}/>}
      {screen==="candidate" && <Login role="candidate" onBack={()=>setScreen("home")} onLogin={u=>setSession({role:"candidate",user:u})}/>}
    </div>
  );
}

function Home({ onAdmin, onCandidate }) {
  return (
    <div style={S.homePage}>
      <div style={{textAlign:"center"}}>
        <div style={S.logo}>EXAMCORE</div>
        <div style={{color:"#4b5563",fontSize:12,letterSpacing:"3px",textTransform:"uppercase",marginTop:4}}>Professional Testing Platform</div>

      <div style={{display:"flex",gap:20,flexWrap:"wrap",justifyContent:"center"}}>
        <PortalCard title="Admin Portal"     icon="⚙" desc="Create exams · Manage candidates · Release results" color="#6366f1" onClick={onAdmin}/>
        <PortalCard title="Candidate Portal" icon="✎" desc="Attempt exams · View your scores" color="#8b5cf6" onClick={onCandidate}/>
      </div>

}
function PortalCard({ title, icon, desc, color, onClick }) {
  const [h,setH]=useState(false);
  return (
    <div style={{...S.portalCard,...(h?{borderColor:color,background:color+"18"}:{})}} onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)}>
      <div style={{fontSize:34,marginBottom:10}}>{icon}</div>
      <div style={{fontSize:17,fontWeight:800,color:"#f9fafb",marginBottom:6}}>{title}</div>
      <div style={{fontSize:13,color:"#6b7280",lineHeight:1.6,marginBottom:18}}>{desc}</div>
      <button style={{...S.btn,background:color}} onClick={onClick}>Enter →</button>
    </div>
  );
}

function Login({ role, onBack, onLogin }) {
  const [u,setU]=useState(""); const [p,setP]=useState(""); const [err,setErr]=useState(""); const [loading,setLoading]=useState(false);
  async function submit(){
    setErr(""); setLoading(true);
    try{
      if(role==="admin"){
        const rows=await dbGet("admin","select=username,password");
        if(!rows?.length){setErr("No admin found.");setLoading(false);return;}
        if(!rows.find(r=>r.username===u&&r.password===p)){setErr("Wrong username or password.");setLoading(false);return;}
        onLogin();
      }else{
        const rows=await dbGet("candidates",`select=*&username=eq.${encodeURIComponent(u)}`);
        if(!rows?.length){setErr("No account found. Contact your admin.");setLoading(false);return;}
        const m=rows.find(r=>r.password===p);
        if(!m){setErr("Wrong password.");setLoading(false);return;}
        onLogin({id:m.id,name:m.name,username:m.username,email:m.email});
      }
    }catch(e){setErr("Error: "+e.message);}
    setLoading(false);
  }
  return (
    <div style={S.loginWrap}>
      <div style={S.loginBox}>
        <button style={{background:"none",border:"none",color:"#6b7280",cursor:"pointer",fontSize:13,marginBottom:16,padding:0}} onClick={onBack}>← Back</button>
        <div style={{fontSize:22,fontWeight:800,color:"#f9fafb",marginBottom:4}}>{role==="admin"?"Admin Login":"Candidate Login"}</div>
        <div style={{fontSize:12,color:"#4b5563",marginBottom:22}}>{role==="candidate"?"Use credentials provided by your admin":"Enter your admin credentials"}</div>
        <div style={{marginBottom:14}}><label style={S.label}>Username</label><input style={S.inp} value={u} autoFocus onChange={e=>setU(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()} placeholder="Username"/></div>
        <div style={{marginBottom:14}}><label style={S.label}>Password</label><input style={S.inp} type="password" value={p} onChange={e=>setP(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()} placeholder="Password"/></div>
        {err&&<div style={S.errBox}>{err}</div>}
        <button style={{...S.btn,width:"100%",justifyContent:"center",marginTop:6}} onClick={submit} disabled={loading}>{loading?"Please wait...":"Login"}</button>
      </div>
    </div>
  );
}

// ANNOUNCEMENT MANAGER (ADMIN)
// ══════════════════════════════════════════════════════════════════════════════
function AnnouncementManager() {
  const [announcements, setAnnouncements] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showForm, setShowForm] = useState(false);
  const [editing, setEditing] = useState(null);
  const [form, setForm] = useState({ title:"", message:"", type:"info", active:true });
  const [saving, setSaving] = useState(false);
  const f = (k,v) => setForm(p=>({...p,[k]:v}));

  async function load() {
    setLoading(true);
    try { const d = await dbGet("announcements","select=*&order=created_at.desc"); setAnnouncements(d||[]); }
    catch(e) { console.error(e); }
    setLoading(false);
  }
  useEffect(()=>{ load(); },[]);

  function openNew() { setForm({title:"",message:"",type:"info",active:true}); setEditing(null); setShowForm(true); }
  function openEdit(a) { setForm({title:a.title,message:a.message,type:a.type,active:a.active}); setEditing(a.id); setShowForm(true); }

  async function save() {
    if (!form.title.trim() || !form.message.trim()) return;
    setSaving(true);
    try {
      if (editing) await dbUpdate("announcements",{id:editing},form);
      else await dbInsert("announcements",{...form, id:uid()});
      await load(); setShowForm(false); setEditing(null);
    } catch(e) { alert("Error: "+e.message); }
    setSaving(false);
  }

  async function toggle(a) {
    try { await dbUpdate("announcements",{id:a.id},{active:!a.active}); await load(); }
    catch(e) { alert(e.message); }
  }

  async function remove(id) {
    try { await dbDelete("announcements",{id}); setAnnouncements(p=>p.filter(x=>x.id!==id)); }
    catch(e) { alert(e.message); }
  }

  return (
    <Panel title="Announcements" action={<Btn primary onClick={openNew}>{IC.plus} New Announcement</Btn>}>

      {/* FORM */}
      {showForm && (
        <div style={{background:"rgba(99,102,241,.05)",border:"1px solid rgba(99,102,241,.2)",borderRadius:14,padding:22,marginBottom:24,animation:"slideDown .2s ease"}}>
          <div style={{fontSize:15,fontWeight:700,color:"#f9fafb",marginBottom:16}}>{editing?"Edit Announcement":"New Announcement"}</div>
          <Grid2>
            <Field label="Title"><input style={S.inp} value={form.title} onChange={e=>f("title",e.target.value)} placeholder="Announcement title"/></Field>
            <Field label="Type">
              <select style={S.inp} value={form.type} onChange={e=>f("type",e.target.value)}>
                {Object.entries(ANN_TYPES).map(([k,v])=>(<option key={k} value={k}>{v.icon} {v.label}</option>))}
              </select>
            </Field>
          </Grid2>
          <Field label="Message">
            <textarea style={{...S.inp,minHeight:90,resize:"vertical"}} value={form.message} onChange={e=>f("message",e.target.value)} placeholder="Write your announcement here..."/>
          </Field>
          <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:16}}>
            <label style={{display:"flex",alignItems:"center",gap:8,fontSize:13,color:"#9ca3af",cursor:"pointer"}}>
              <input type="checkbox" checked={form.active} onChange={e=>f("active",e.target.checked)} style={{width:16,height:16}}/>
              Active (visible to candidates)
            </label>
          </div>
          {/* PREVIEW */}
          {(form.title||form.message) && (
            <div style={{marginBottom:16}}>
              <div style={{fontSize:11,color:"#4b5563",textTransform:"uppercase",letterSpacing:"1px",marginBottom:8,fontWeight:700}}>Preview</div>
              <AnnouncementCard ann={{...form, created_at:new Date().toISOString()}} preview/>
            </div>
          )}
          <div style={{display:"flex",gap:8}}>
            <Btn primary onClick={save}>{saving?"Saving...":editing?"Update":"Post Announcement"}</Btn>
            <Btn ghost onClick={()=>{ setShowForm(false); setEditing(null); }}>Cancel</Btn>
          </div>
        </div>
      )}

      {loading && <Loader/>}
      {!loading && announcements.length===0 && <Empty text="No announcements yet. Create one to notify candidates."/>}

      {/* STATS ROW */}
      {announcements.length>0 && (
        <div style={{display:"flex",gap:10,marginBottom:20,flexWrap:"wrap"}}>
          <div style={S.statBox}><div style={{fontSize:22,fontWeight:900,color:"#a78bfa"}}>{announcements.length}</div><div style={{fontSize:11,color:"#6b7280"}}>Total</div></div>
          <div style={S.statBox}><div style={{fontSize:22,fontWeight:900,color:"#22c55e"}}>{announcements.filter(a=>a.active).length}</div><div style={{fontSize:11,color:"#6b7280"}}>Active</div></div>
          <div style={S.statBox}><div style={{fontSize:22,fontWeight:900,color:"#ef4444"}}>{announcements.filter(a=>a.type==="urgent").length}</div><div style={{fontSize:11,color:"#6b7280"}}>Urgent</div></div>
        </div>
      )}

      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {announcements.map(a=>(
          <div key={a.id} style={{background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.07)",borderRadius:12,overflow:"hidden"}}>
            <AnnouncementCard ann={a}/>
            <div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 16px",borderTop:"1px solid rgba(255,255,255,.06)",background:"rgba(0,0,0,.2)"}}>
              <Badge label={a.active?"Active":"Hidden"} color={a.active?"green":"gray"}/>
              <Badge label={ANN_TYPES[a.type]?.label||a.type} color={a.type==="urgent"?"red":a.type==="warning"?"yellow":a.type==="success"?"green":"purple"}/>
              <span style={{fontSize:11,color:"#4b5563",marginLeft:"auto"}}>{fmtDate(a.created_at)}</span>
              <button onClick={()=>toggle(a)} style={{background:a.active?"rgba(239,68,68,.1)":"rgba(34,197,94,.1)",border:`1px solid ${a.active?"rgba(239,68,68,.2)":"rgba(34,197,94,.2)"}`,borderRadius:6,padding:"4px 10px",color:a.active?"#ef4444":"#22c55e",cursor:"pointer",fontSize:12,fontWeight:600}}>
                {a.active?"Hide":"Show"}
              </button>
              <Btn onClick={()=>openEdit(a)}>{IC.edit}</Btn>
              <Btn danger onClick={()=>remove(a.id)}>{IC.trash}</Btn>
            </div>
          </div>
        ))}
      < {announcements.map(a=>(
          <div key={a.id} style={{background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.07)",borderRadius:12,overflow:"hidden"}}>
            <AnnouncementCard ann={a}/>
            <div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 16px",borderTop:"1px solid rgba(255,255,255,.06)",background:"rgba(0,0,0,.2)"}}>
              <Badge label={a.active?"Active":"Hidden"} color={a.active?"green":"gray"}/>
              <Badge label={ANN_TYPES[a.type]?.label||a.type} color={a.type==="urgent"?"red":a.type==="warning"?"yellow":a.type==="success"?"green":"purple"}/>
              <span style={{fontSize:11,color:"#4b5563",marginLeft:"auto"}}>{fmtDate(a.created_at)}</span>

              <button
                onClick={()=>toggle(a)}
                style={{
                  background:a.active
                    ?"rgba(239,68,68,.1)"
                    :"rgba(34,197,94,.1)",
                  border:`1px solid ${
                    a.active
                      ?"rgba(239,68,68,.2)"
                      :"rgba(34,197,94,.2)"
                  }`,
                  borderRadius:6,
                  padding:"4px 10px",
                  color:a.active?"#ef4444":"#22c55e",
                  cursor:"pointer",
                  fontSize:12,
                  fontWeight:600
                }}
              >
                {a.active?"Hide":"Show"}
              </button>

              <Btn onClick={()=>openEdit(a)}>{IC.edit}</Btn>
              <Btn danger onClick={()=>remove(a.id)}>{IC.trash}</Btn>
            </div>
          </div>
        ))}
      </div>
    </Panel>
  );
}

// ── ANNOUNCEMENT CARD ────────────────────────────────────────────────────────
function AnnouncementCard({ ann, preview=false }) {
  const t = ANN_TYPES[ann.type] || ANN_TYPES.info;

  return (
    <div
      style={{
        padding:"18px",
        background:t.bg,
        borderLeft:`4px solid ${t.color}`,
        position:"relative"
      }}
    >
      <div style={{display:"flex",alignItems:"flex-start",gap:12}}>
        <div style={{fontSize:22}}>{t.icon}</div>

        <div style={{flex:1}}>
          <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
            <div style={{fontSize:16,fontWeight:800,color:"#f9fafb"}}>
              {ann.title}
            </div>

            {!preview && (
              <span
                style={{
                  fontSize:10,
                  padding:"3px 8px",
                  borderRadius:999,
                  background:"rgba(255,255,255,.08)",
                  color:t.color,
                  fontWeight:700,
                  textTransform:"uppercase",
                  letterSpacing:"1px"
                }}
              >
                {t.label}
              </span>
            )}
          </div>

          <div
            style={{
              marginTop:8,
              fontSize:13,
              lineHeight:1.8,
              color:"#d1d5db",
              whiteSpace:"pre-wrap"
            }}
          >
            {ann.message}
          </div>

          <div
            style={{
              marginTop:12,
              fontSize:11,
              color:"#6b7280",
              display:"flex",
              alignItems:"center",
              gap:6
            }}
          >
            {IC.clock}
            {fmtDate(ann.created_at)}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── SMALL UI HELPERS ─────────────────────────────────────────────────────────
function Panel({ title, action, children }) {
  return (
    <div>
      <div
        style={{
          display:"flex",
          alignItems:"center",
          justifyContent:"space-between",
          marginBottom:22,
          gap:12,
          flexWrap:"wrap"
        }}
      >
        <div>
          <div style={{fontSize:24,fontWeight:900,color:"#f9fafb"}}>
            {title}
          </div>
        </div>

        {action}
      </div>

      {children}
    </div>
  );
}

function Btn({ children, primary, danger, ghost, onClick }) {
  let bg = "rgba(255,255,255,.06)";
  let border = "1px solid rgba(255,255,255,.08)";
  let color = "#d1d5db";

  if (primary) {
    bg = "linear-gradient(135deg,#6366f1,#8b5cf6)";
    border = "none";
    color = "#fff";
  }

  if (danger) {
    bg = "rgba(239,68,68,.1)";
    border = "1px solid rgba(239,68,68,.2)";
    color = "#ef4444";
  }

  if (ghost) {
    bg = "transparent";
    border = "1px solid rgba(255,255,255,.08)";
  }

  return (
    <button
      onClick={onClick}
      style={{
        display:"flex",
        alignItems:"center",
        gap:7,
        background:bg,
        border,
        color,
        padding:"9px 14px",
        borderRadius:10,
        cursor:"pointer",
        fontSize:13,
        fontWeight:700
      }}
    >
      {children}
    </button>
  );
}

function Badge({ label, color }) {
  const colors = {
    red:"#ef4444",
    green:"#22c55e",
    yellow:"#eab308",
    purple:"#8b5cf6",
    gray:"#6b7280"
  };

  return (
    <span
      style={{
        background:colors[color]+"20",
        border:`1px solid ${colors[color]}30`,
        color:colors[color],
        fontSize:10,
        fontWeight:700,
        padding:"4px 8px",
        borderRadius:999,
        textTransform:"uppercase",
        letterSpacing:"1px"
      }}
    >
      {label}
    </span>
  );
}

function Field({ label, children }) {
  return (
    <div style={{marginBottom:16}}>
      <div
        style={{
          fontSize:11,
          color:"#9ca3af",
          marginBottom:6,
          textTransform:"uppercase",
          letterSpacing:"1px",
          fontWeight:700
        }}
      >
        {label}
      </div>

      {children}
    </div>
  );
}

function Grid2({ children }) {
  return (
    <div
      style={{
        display:"grid",
        gridTemplateColumns:"repeat(auto-fit,minmax(240px,1fr))",
        gap:16
      }}
    >
      {children}
    </div>
  );
}

function Loader() {
  return (
    <div
      style={{
        display:"flex",
        alignItems:"center",
        justifyContent:"center",
        padding:"40px"
      }}
    >
      <div
        style={{
          width:30,
          height:30,
          border:"3px solid rgba(99,102,241,.2)",
          borderTop:"3px solid #8b5cf6",
          borderRadius:"50%",
          animation:"spin 1s linear infinite"
        }}
      />
    </div>
  );
}

function Empty({ text }) {
  return (
    <div
      style={{
        textAlign:"center",
        padding:"50px 20px",
        border:"1px dashed rgba(255,255,255,.08)",
        borderRadius:14,
        color:"#6b7280",
        fontSize:14
      }}
    >
      {text}
    </div>
  );
}
