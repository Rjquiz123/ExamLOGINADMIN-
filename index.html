async function sbFetch(method, table, query, body) {
  const url = SB_URL+"/rest/v1/"+table+(query?"?"+query:"");
  const opts = {method, headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":"application/json","Prefer":"return=representation"}};
  if(body!==undefined) opts.body=JSON.stringify(body);
  const res = await fetch(url,opts);
  const text = await res.text();
  if(!res.ok) throw new Error(text||res.statusText);
  if(!text||text==="null") return [];
  try{return JSON.parse(text);}catch{return [];}
}
const dbGet    = (t,q)   => sbFetch("GET",   t,q);
const dbInsert = (t,d)   => sbFetch("POST",  t,"",d);
const dbUpdate = (t,m,d) => sbFetch("PATCH", t,Object.entries(m).map(([k,v])=>k+"=eq."+encodeURIComponent(v)).join("&"),d);
const dbDelete = (t,m)   => sbFetch("DELETE",t,Object.entries(m).map(([k,v])=>k+"=eq."+encodeURIComponent(v)).join("&"));

function timeAgo(d) { const s=Math.floor((Date.now()-new Date(d))/1000); if(s<60)return s+"s ago"; if(s<3600)return Math.floor(s/60)+"m ago"; if(s<86400)return Math.floor(s/3600)+"h ago"; return Math.floor(s/86400)+"d ago"; }

// ── CONNECT CHECK ─────────────────────────────────────────────────────────────
function ConnectCheck({onReady}) {
  const [st,setSt]=useState("checking"); const [err,setErr]=useState("");
  async function check(){setSt("checking");setErr("");try{await dbGet("admin","select=id&limit=1");setSt("ok");setTimeout(()=>onReady(),500);}catch(e){setSt("error");setErr(e.message);}}
  useEffect(()=>{check();},[]);
  if(st==="ok") return <Center><div style={{fontSize:40}}>✅</div><div style={{color:"#22c55e",fontWeight:700,marginTop:8}}>Connected!</div></Center>;
  if(st==="checking") return <Center><div style={{width:36,height:36,border:"3px solid rgba(99,102,241,.2)",borderTop:"3px solid #a78bfa",borderRadius:"50%",animation:"spin 1s linear infinite"}}/><div style={{color:"#4b5563",fontSize:13,marginTop:12}}>Connecting...</div></Center>;
  return <Center><div style={{fontSize:36}}>❌</div><div style={{color:"#ef4444",fontWeight:700,fontSize:18,marginTop:8}}>Connection Failed</div><div style={{color:"#6b7280",fontSize:13,maxWidth:360,textAlign:"center",marginTop:8,lineHeight:1.7}}>{err}</div><button onClick={check} style={{...C.btn,marginTop:16}}>Retry</button></Center>;
}
function Center({children}){return <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:"#07070f",padding:24}}>{children}</div>;}

// ── APP ROOT ──────────────────────────────────────────────────────────────────
function App() {
  const [ready,setReady]=useState(false); const [session,setSession]=useState(null); const [screen,setScreen]=useState("home");
  function logout(){setSession(null);setScreen("home");}
  if(!ready) return <ConnectCheck onReady={()=>setReady(true)}/>;
  if(session?.role==="admin")     return <AdminApp onLogout={logout}/>;
  if(session?.role==="candidate") return <CandidateApp user={session.user} onLogout={logout}/>;
  return (
    <div style={{minHeight:"100vh",background:"#07070f"}}>
      {screen==="home"      && <HomePage onAdmin={()=>setScreen("admin")} onCandidate={()=>setScreen("candidate")}/>}
      {screen==="admin"     && <LoginPage role="admin"     onBack={()=>setScreen("home")} onLogin={()=>setSession({role:"admin"})}/>}
      {screen==="candidate" && <LoginPage role="candidate" onBack={()=>setScreen("home")} onLogin={u=>setSession({role:"candidate",user:u})}/>}
    </div>
  );
}

// ── LOGIN ─────────────────────────────────────────────────────────────────────
function LoginPage({role,onBack,onLogin}) {
  const [u,setU]=useState(""); const [p,setP]=useState(""); const [err,setErr]=useState(""); const [loading,setLoading]=useState(false);
  async function submit(){
    setErr(""); setLoading(true);
    try{
      if(role==="admin"){const rows=await dbGet("admin","select=username,password");if(!rows?.length||!rows.find(r=>r.username===u&&r.password===p)){setErr("Wrong username or password.");setLoading(false);return;}onLogin();}
      else{const rows=await dbGet("candidates","select=*&username=eq."+encodeURIComponent(u));if(!rows?.length){setErr("No account found.");setLoading(false);return;}const m=rows.find(r=>r.password===p);if(!m){setErr("Wrong password.");setLoading(false);return;}onLogin({id:m.id,name:m.name,username:m.username,email:m.email});}
    }catch(e){setErr("Error: "+e.message);}
    setLoading(false);
  }
  return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",padding:24}}>
      <div style={{background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.08)",borderRadius:18,padding:36,width:"100%",maxWidth:380,animation:"fadeIn .3s ease"}}>
        <button style={{background:"none",border:"none",color:"#4b5563",cursor:"pointer",fontSize:13,marginBottom:20,padding:0}} onClick={onBack}>← Back</button>
        <div style={{fontSize:24,fontWeight:800,color:"#f9fafb",marginBottom:3}}>{role==="admin"?"Admin Login":"Candidate Login"}</div>
        <div style={{fontSize:12,color:"#4b5563",marginBottom:24}}>{role==="candidate"?"Use credentials from your admin":"Enter admin credentials"}</div>
        <Fld label="Username"><input style={C.inp} value={u} autoFocus onChange={e=>setU(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()} placeholder="Username"/></Fld>
        <Fld label="Password"><input style={C.inp} type="password" value={p} onChange={e=>setP(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()} placeholder="Password"/></Fld>
        {err&&<div style={{color:"#ef4444",fontSize:13,padding:"8px 12px",background:"rgba(239,68,68,.08)",borderRadius:8,marginBottom:10}}>{err}</div>}
        <button style={{...C.btn,width:"100%",justifyContent:"center",marginTop:4}} onClick={submit} disabled={loading}>{loading?"Please wait...":"Login"}</button>
      </div>
    </div>
  );
}

      {!adding&&<button style={{...C.btnGhost,marginTop:8}} onClick={()=>setAdding(true)}>{Ico.plus} Add Question</button>}
      {adding&&(<div style={{background:"rgba(255,255,255,.02)",border:"1px solid rgba(255,255,255,.06)",borderRadius:10,padding:18,marginTop:12}}>
        <Fld label="Type"><select style={C.inp} value={nq.type} onChange={e=>setNq(q=>({...q,type:e.target.value,correct:e.target.value==="mcq_multi"?[]:0}))}><option value="mcq">MCQ – Single Correct</option><option value="mcq_multi">MCQ – Multiple Correct</option><option value="numerical">Numerical</option></select></Fld>
        <Fld label="Question"><textarea style={{...C.inp,minHeight:70}} value={nq.text} onChange={e=>setNq(q=>({...q,text:e.target.value}))} placeholder="Question..."/></Fld>
        {(nq.type==="mcq"||nq.type==="mcq_multi")&&nq.options.map((o,i)=>(<div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>{nq.type==="mcq"?<input type="radio" checked={nq.correct===i} onChange={()=>setNq(q=>({...q,correct:i}))}/>:<input type="checkbox" checked={Array.isArray(nq.correct)&&nq.correct.includes(i)} onChange={()=>{const c=Array.isArray(nq.correct)?nq.correct:[];setNq(q=>({...q,correct:c.includes(i)?c.filter(x=>x!==i):[...c,i]}));}}/>}<span style={{color:"#4b5563",fontSize:13,width:18}}>{String.fromCharCode(65+i)}.</span><input style={{...C.inp,flex:1}} value={o} onChange={e=>{const opts=[...nq.options];opts[i]=e.target.value;setNq(q=>({...q,options:opts}));}} placeholder={"Option "+String.fromCharCode(65+i)}/></div>))}
        {nq.type==="numerical"&&<Fld label="Correct Answer"><input style={C.inp} value={nq.answer||""} onChange={e=>setNq(q=>({...q,answer:e.target.value}))} placeholder="Exact number"/></Fld>}
        <G2><Fld label="Marks (+)"><input style={C.inp} type="number" value={nq.marks} onChange={e=>setNq(q=>({...q,marks:+e.target.value}))}/></Fld><Fld label="Neg Marks (-)"><input style={C.inp} type="number" value={nq.negMarks} onChange={e=>setNq(q=>({...q,negMarks:+e.target.value}))}/></Fld></G2>

function CandidateManager() {

// ── RESULTS MANAGER ───────────────────────────────────────────────────────────
function ResultsManager() {
  const [quizzes,setQuizzes]=useState([]); const [candidates,setCandidates]=useState([]); const [subs,setSubs]=useState([]); const [sel,setSel]=useState(null); const [loading,setLoading]=useState(true); const [working,setWorking]=useState(false);
  async function load(){setLoading(true);try{const [q,c,s]=await Promise.all([dbGet("quizzes","select=*&order=created_at.desc"),dbGet("candidates","select=id,name,username"),dbGet("submissions","select=*&order=submitted_at.desc")]);setQuizzes((q||[]).map(x=>({...x,scheduledFor:x.scheduled_for,resultsReleased:x.results_released})));setCandidates(c||[]);setSubs(s||[]);}catch(e){console.error(e);}setLoading(false);}
  useEffect(()=>{load();},[]);
  const quiz=quizzes.find(q=>q.id===sel); const qSubs=subs.filter(s=>s.quiz_id===sel); const totalM=quiz?(quiz.questions||[]).reduce((a,q)=>a+q.marks,0):0;
  function gradeOne(sub,qs){const ans=sub.answers||{};let sc=0;for(const q of qs){const a=ans[q.id];if(a===undefined||a===null||a==="")continue;if(q.type==="mcq"){if(+a===q.correct)sc+=q.marks;else sc-=(q.negMarks||0);}else if(q.type==="mcq_multi"){const cor=[...(Array.isArray(q.correct)?q.correct:[q.correct])].sort().join(",");const giv=[...(Array.isArray(a)?a:[a])].sort().join(",");if(cor===giv)sc+=q.marks;else sc-=(q.negMarks||0);}else{if(String(a).trim()===String(q.answer).trim())sc+=q.marks;else sc-=(q.negMarks||0);}}return Math.max(0,sc);}
  async function gradeAll(){if(!quiz)return;setWorking(true);try{for(const s of qSubs){const sc=gradeOne(s,quiz.questions||[]);await dbUpdate("submissions",{id:s.id},{score:sc,graded:true});}await dbUpdate("quizzes",{id:sel},{status:"graded"});await load();}catch(e){alert(e.message);}setWorking(false);}
  async function release(){setWorking(true);try{await dbUpdate("quizzes",{id:sel},{results_released:true});await load();}catch(e){alert(e.message);}setWorking(false);}
  return (
    <Page title="Results & Grading" sub="Grade and release scores">
      {loading&&<Loader/>}
      {!loading&&<>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:20}}>{quizzes.length===0&&<Empty text="No quizzes yet."/>}{quizzes.map(q=>(<button key={q.id} style={{...C.chip,...(sel===q.id?C.chipOn:{})}} onClick={()=>setSel(q.id)}>{q.title}<span style={{background:"rgba(255,255,255,.08)",borderRadius:10,padding:"1px 7px",fontSize:11,marginLeft:6}}>{subs.filter(s=>s.quiz_id===q.id).length}</span></button>))}</div>
        {quiz&&<>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12,flexWrap:"wrap",padding:"11px 16px",background:"rgba(255,255,255,.02)",borderRadius:12,border:"1px solid rgba(255,255,255,.06)"}}><span style={{fontWeight:700,color:"#f9fafb",flex:1}}>{quiz.title}</span><span style={{color:"#4b5563",fontSize:13}}>Total: {totalM} marks</span><Badge label={quiz.status||"draft"} color={quiz.status==="graded"?"blue":"gray"}/>{quiz.resultsReleased&&<Badge label="Released" color="green"/>}</div>
          <div style={{display:"flex",gap:8,marginBottom:16}}><Btn primary onClick={gradeAll}>{working?"Working...":"⚡ Auto-Grade All"}</Btn>{quiz.status==="graded"&&!quiz.resultsReleased&&(<button style={{...C.btn,background:"#15803d"}} onClick={release} disabled={working}>{working?"Working...":"🚀 Release to Candidates"}</button>)}</div>
          {qSubs.length===0&&<Empty text="No submissions yet."/>}
          {qSubs.length>0&&(<div style={{border:"1px solid rgba(255,255,255,.06)",borderRadius:12,overflow:"hidden"}}><div style={{display:"grid",gridTemplateColumns:"2fr 2fr 1fr 1fr 1fr",padding:"10px 16px",background:"rgba(255,255,255,.03)",fontWeight:700,color:"#4b5563",fontSize:11,textTransform:"uppercase",letterSpacing:"1px"}}><div>Candidate</div><div>Submitted</div><div>Score</div><div>Status</div><div>Violations</div></div>{qSubs.map(s=>{const cand=candidates.find(x=>x.id===s.candidate_id);const v=s.violations||[];return(<div key={s.id} style={{display:"grid",gridTemplateColumns:"2fr 2fr 1fr 1fr 1fr",padding:"11px 16px",borderTop:"1px solid rgba(255,255,255,.04)",fontSize:13,color:"#d1d5db",alignItems:"center"}}><div style={{fontWeight:500}}>{cand?.name||"—"}</div><div style={{fontSize:12,color:"#4b5563"}}>{fmtDate(s.submitted_at)}</div><div style={{fontWeight:700,color:s.graded?"#a78bfa":"#374151"}}>{s.graded?s.score+" / "+totalM:"—"}</div><div><Badge label={s.graded?"Graded":"Pending"} color={s.graded?"green":"gray"}/></div><div>{v.length>0?<Badge label={v.length+" ⚠"} color="red"/>:<span style={{color:"#22c55e",fontSize:12}}>✓ Clean</span>}</div></div>);})}</div>)}
        </>}
      </>}
    </Page>
  );
}

// ── LIVE MONITOR ──────────────────────────────────────────────────────────────
function LiveMonitor() {
  const [quizzes,setQuizzes]=useState([]); const [sel,setSel]=useState(null); const [sessions,setSessions]=useState([]); const [candidates,setCandidates]=useState([]); const [alerts,setAlerts]=useState([]); const [loading,setLoading]=useState(true); const [alertMsg,setAlertMsg]=useState(""); const [alertType,setAlertType]=useState("warning"); const [target,setTarget]=useState("all"); const [sending,setSending]=useState(false); const [lastRef,setLastRef]=useState(null);
  const ref=useRef(null);
  async function loadQ(){try{const [q,c]=await Promise.all([dbGet("quizzes","select=*&status=in.(published,graded)&order=created_at.desc"),dbGet("candidates","select=id,name,username")]);setQuizzes(q||[]);setCandidates(c||[]);}catch(e){console.error(e);}setLoading(false);}
  async function refresh(){if(!sel)return;try{const [s,a]=await Promise.all([dbGet("exam_sessions","select=*&quiz_id=eq."+sel+"&order=last_seen.desc"),dbGet("live_alerts","select=*&quiz_id=eq."+sel+"&order=created_at.desc&limit=20")]);setSessions(s||[]);setAlerts(a||[]);setLastRef(new Date());}catch(e){console.error(e);}}
  useEffect(()=>{loadQ();},[]);
  useEffect(()=>{refresh();clearInterval(ref.current);if(sel)ref.current=setInterval(refresh,MON_REFRESH);return()=>clearInterval(ref.current);},[sel]);
  async function send(){if(!alertMsg.trim()||!sel)return;setSending(true);try{await dbInsert("live_alerts",{id:uid(),quiz_id:sel,candidate_id:target==="all"?null:target,message:alertMsg.trim(),type:alertType});setAlertMsg("");await refresh();}catch(e){alert("Error: "+e.message);}setSending(false);}
  const quiz=quizzes.find(q=>q.id===sel); const now=Date.now();
  const online=sessions.filter(s=>s.status==="active"&&(now-new Date(s.last_seen))<ONLINE_MS);
  function name(id){return candidates.find(c=>c.id===id)?.name||id;}
  const AC={warning:{bg:"rgba(234,179,8,.1)",bd:"rgba(234,179,8,.4)",c:"#eab308",i:"⚠️"},urgent:{bg:"rgba(239,68,68,.1)",bd:"rgba(239,68,68,.4)",c:"#ef4444",i:"🚨"},info:{bg:"rgba(99,102,241,.1)",bd:"rgba(99,102,241,.4)",c:"#a78bfa",i:"ℹ️"}};
  return (
    <Page title="Live Monitor" sub="Real-time exam supervision">
      {loading&&<Loader/>}
      {!loading&&<>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:20}}>{quizzes.length===0&&<Empty text="No published quizzes."/>}{quizzes.map(q=>(<button key={q.id} style={{...C.chip,...(sel===q.id?C.chipOn:{})}} onClick={()=>setSel(q.id)}>{q.title}</button>))}</div>
        {sel&&<>
          <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:10,marginBottom:18}}>
            {[[sessions.length,"In Exam","#a78bfa"],[online.length,"Online","#22c55e"],[sessions.length-online.length,"Offline","#6b7280"],[sessions.reduce((a,s)=>a+(s.violations_count||0),0),"Violations","#ef4444"],[lastRef?timeAgo(lastRef):"—","Last Refresh","#f59e0b"]].map(([v,l,c])=>(
              <div key={l} style={{background:"rgba(255,255,255,.025)",border:"1px solid rgba(255,255,255,.06)",borderRadius:12,padding:"13px 16px",textAlign:"center"}}>
                <div style={{fontSize:20,fontWeight:900,color:c}}>{v}</div>
                <div style={{fontSize:10,color:"#4b5563",marginTop:2}}>{l}</div>
              </div>
            ))}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 350px",gap:16}}>
            <div>
              <SL>📡 Candidate Status</SL>

function Attempt({quiz,user,onSubmit}) {

  const timerRef=useRef(null); const violRef=useRef([]); const ansRef=useRef({}); const doneRef=useRef(false); const hbRef=useRef(null); const pollRef=useRef(null); const sidRef=useRef(uid()); const lastAlertRef=useRef(null);
  useEffect(()=>{violRef.current=violations;},[violations]);
  useEffect(()=>{ansRef.current=answers;},[answers]);
  async function upsertSession(extra){try{await sbFetch("POST","exam_sessions?on_conflict=candidate_id,quiz_id","",{id:sidRef.current,candidate_id:user.id,quiz_id:quiz.id,last_seen:new Date().toISOString(),answers_count:Object.keys(ansRef.current).filter(k=>{const a=ansRef.current[k];return a!==undefined&&a!==""&&!(Array.isArray(a)&&a.length===0);}).length,violations_count:violRef.current.length,status:"active",...(extra||{})});}catch(e){console.warn(e.message);}}
  async function pollAlerts(){try{const rows=await dbGet("live_alerts","select=*&quiz_id=eq."+quiz.id+"&order=created_at.desc&limit=10");const rel=(rows||[]).filter(a=>a.candidate_id===null||a.candidate_id===user.id);if(rel.length>0){const n=rel[0];if(lastAlertRef.current!==n.id){lastAlertRef.current=n.id;setAlertPopup(n);setAdminAlerts(rel);setTimeout(()=>setAlertPopup(null),8000);}}}catch(e){console.warn(e.message);}}
  useEffect(()=>{upsertSession();hbRef.current=setInterval(()=>upsertSession(),HEARTBEAT);pollRef.current=setInterval(pollAlerts,ALERT_POLL);pollAlerts();return()=>{clearInterval(hbRef.current);clearInterval(pollRef.current);};},[]);
  useEffect(()=>{const el=document.documentElement;const fn=el.requestFullscreen||el.webkitRequestFullscreen||el.mozRequestFullScreen;if(fn)fn.call(el).then(()=>setIsFS(true)).catch(()=>{});const chg=()=>{const f=!!(document.fullscreenElement||document.webkitFullscreenElement);setIsFS(f);if(!f&&!doneRef.current)addV("Exited fullscreen");};document.addEventListener("fullscreenchange",chg);document.addEventListener("webkitfullscreenchange",chg);return()=>{document.removeEventListener("fullscreenchange",chg);document.removeEventListener("webkitfullscreenchange",chg);if(document.fullscreenElement)document.exitFullscreen&&document.exitFullscreen();};},[]);
  useEffect(()=>{const fn=()=>{if(document.hidden&&!doneRef.current)addV("Switched tab");};document.addEventListener("visibilitychange",fn);return()=>document.removeEventListener("visibilitychange",fn);},[]);
  useEffect(()=>{const fn=()=>{if(!doneRef.current)addV("Window lost focus");};window.addEventListener("blur",fn);return()=>window.removeEventListener("blur",fn);},[]);
  useEffect(()=>{const fn=e=>{if(e.ctrlKey||e.metaKey||e.key==="F12"||e.key==="PrintScreen"){e.preventDefault();e.stopPropagation();if(!doneRef.current)addV("Blocked key: "+e.key);}};document.addEventListener("keydown",fn,true);return()=>document.removeEventListener("keydown",fn,true);},[]);
  useEffect(()=>{const cp=e=>{e.preventDefault();if(!doneRef.current)addV("Copy");};const ps=e=>{e.preventDefault();if(!doneRef.current)addV("Paste");};const rc=e=>{e.preventDefault();if(!doneRef.current)addV("Right-click");};document.addEventListener("copy",cp);document.addEventListener("paste",ps);document.addEventListener("contextmenu",rc);return()=>{document.removeEventListener("copy",cp);document.removeEventListener("paste",ps);document.removeEventListener("contextmenu",rc);};},[]);
  useEffect(()=>{timerRef.current=setInterval(()=>{setSecs(s=>{if(s<=1){clearInterval(timerRef.current);doSubmit("Time expired");return 0;}return s-1;});},1000);return()=>clearInterval(timerRef.current);},[]);
  function addV(type){if(doneRef.current)return;const v={type,time:new Date().toISOString()};const upd=[...violRef.current,v];violRef.current=upd;setViolations(upd);setToast({msg:type,count:upd.length,left:MAX_WARN-upd.length});setTimeout(()=>setToast(null),4000);if(upd.length>=MAX_WARN)doSubmit("Auto-submitted: too many violations");}
  async function doSubmit(reason){if(doneRef.current)return;doneRef.current=true;clearInterval(timerRef.current);clearInterval(hbRef.current);clearInterval(pollRef.current);setSubmitting(true);await upsertSession({status:"submitted"});const v=reason?[...violRef.current,{type:reason,time:new Date().toISOString()}]:violRef.current;await onSubmit(ansRef.current,v);setSubmitting(false);}
  function reFS(){const el=document.documentElement;const fn=el.requestFullscreen||el.webkitRequestFullscreen;if(fn)fn.call(el).then(()=>setIsFS(true)).catch(()=>{});}
  const questions=quiz.questions||[]; const q=questions[cur]; const mm=String(Math.floor(secs/60)).padStart(2,"0"); const ss2=String(secs%60).padStart(2,"0"); const urg=secs<300;
  function go(i){setCur(i);setVisited(v=>({...v,[i]:true}));}
  function ans(val){if(q.type==="mcq_multi"){const p=Array.isArray(answers[q.id])?answers[q.id]:[];setAnswers(a=>({...a,[q.id]:p.includes(val)?p.filter(x=>x!==val):[...p,val]}));}else setAnswers(a=>({...a,[q.id]:val}));}
  function clearAns(){setAnswers(a=>{const n={...a};delete n[q.id];return n;});}
  function qSt(i){const qi=questions[i];const a=answers[qi.id];const has=a!==undefined&&a!==""&&!(Array.isArray(a)&&a.length===0);const fl=flags[qi.id];if(fl&&has)return"fa";if(fl)return"f";if(has)return"a";if(visited[i])return"v";return"n";}
  const SC={n:"#1f2937",v:"#7f1d1d",a:"#14532d",f:"#78350f",fa:"#581c87"};
  const answered=questions.filter((_,i)=>{const a=answers[questions[i].id];return a!==undefined&&a!==""&&!(Array.isArray(a)&&a.length===0);}).length;
  const AC={warning:{bg:"rgba(234,179,8,.15)",bd:"rgba(234,179,8,.5)",c:"#eab308",i:"⚠️"},urgent:{bg:"rgba(239,68,68,.15)",bd:"rgba(239,68,68,.5)",c:"#ef4444",i:"🚨"},info:{bg:"rgba(99,102,241,.15)",bd:"rgba(99,102,241,.5)",c:"#a78bfa",i:"ℹ️"}};
  if(!q) return <div style={{padding:40,color:"#f9fafb"}}>No questions found.</div>;
  return (
    <div className="exam-mode" style={{display:"flex",flexDirection:"column",minHeight:"100vh",background:"#07070f",color:"#e5e7eb"}}>
      {toast&&(<div style={{position:"fixed",top:72,left:"50%",transform:"translateX(-50%)",zIndex:1000,background:"#1a0505",border:"1px solid rgba(239,68,68,.5)",borderRadius:12,padding:"12px 20px",minWidth:300,boxShadow:"0 0 40px rgba(239,68,68,.3)",animation:"shake .4s ease"}}><div style={{color:"#fca5a5",fontWeight:700,fontSize:14,marginBottom:3}}>⚠ {toast.msg}</div><div style={{color:"#ef4444",fontSize:13,fontWeight:700}}>Warning {toast.count}/{MAX_WARN} — {toast.left} more = auto-submit</div></div>)}
      {alertPopup&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.75)",zIndex:1999}}/>}
      {alertPopup&&(()=>{const ac=AC[alertPopup.type]||AC.info;return(<div style={{position:"fixed",top:"50%",left:"50%",transform:"translate(-50%,-50%)",zIndex:2000,background:"#0d0d1a",border:"2px solid "+ac.bd,borderRadius:18,padding:30,maxWidth:380,width:"90%",boxShadow:"0 0 60px "+ac.bd,animation:"popIn .3s ease"}}><div style={{textAlign:"center",marginBottom:14}}><div style={{fontSize:40,marginBottom:8}}>{ac.i}</div><div style={{fontSize:18,fontWeight:800,color:ac.c}}>Message from Admin</div></div><div style={{background:ac.bg,border:"1px solid "+ac.bd,borderRadius:10,padding:"14px 16px",marginBottom:16,fontSize:15,color:"#f9fafb",lineHeight:1.7,textAlign:"center"}}>{alertPopup.message}</div><button onClick={()=>setAlertPopup(null)} style={{width:"100%",background:ac.bd,border:"none",borderRadius:8,padding:"10px",color:"#fff",fontWeight:700,cursor:"pointer",fontSize:14}}>Got it</button></div>);})()}
      {!isFS&&(<div style={{background:"rgba(220,38,38,.1)",borderBottom:"1px solid rgba(220,38,38,.2)",padding:"6px 20px",display:"flex",alignItems:"center",gap:10,fontSize:13}}><span style={{color:"#fca5a5"}}>⚠ Not in fullscreen.</span><button onClick={reFS} style={{background:"#dc2626",border:"none",borderRadius:5,padding:"3px 10px",color:"#fff",cursor:"pointer",fontSize:12,fontWeight:700}}>Go Fullscreen</button></div>)}
      <div style={{display:"flex",alignItems:"center",padding:"10px 20px",background:"rgba(0,0,0,.6)",borderBottom:"1px solid rgba(255,255,255,.06)",gap:14,position:"sticky",top:0,zIndex:50,backdropFilter:"blur(10px)"}}>
        <div style={{flex:1,fontWeight:700,fontSize:15,color:"#f9fafb"}}>{quiz.title}</div>
        <div style={{display:"flex",alignItems:"center",gap:5,fontSize:12,color:"#22c55e"}}><div style={{width:6,height:6,borderRadius:"50%",background:"#22c55e",animation:"pulse 2s infinite"}}/>Live</div>
        {violations.length>0&&<div style={{background:"rgba(239,68,68,.12)",border:"1px solid rgba(239,68,68,.25)",borderRadius:6,padding:"4px 10px",fontSize:12,color:"#fca5a5"}}>⚠ {violations.length}</div>}
        <div style={{background:urg?"rgba(220,38,38,.15)":"rgba(99,102,241,.12)",border:"1px solid "+(urg?"rgba(220,38,38,.35)":"rgba(99,102,241,.25)"),borderRadius:8,padding:"6px 14px",fontSize:18,fontWeight:800,color:urg?"#ef4444":"#a78bfa",display:"flex",alignItems:"center",gap:5}}>{Ico.clock} {mm}:{ss2}</div>
        <button style={{...C.btn,background:"#dc2626",padding:"8px 16px"}} onClick={()=>setConfirm(true)}>Submit</button>
      </div>
      <div style={{display:"flex",flex:1,overflow:"hidden"}}>
        <div style={{flex:1,padding:"26px 34px",overflowY:"auto"}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16,flexWrap:"wrap"}}>
            <span style={{fontSize:13,color:"#4b5563",fontWeight:700}}>Q{cur+1} / {questions.length}</span>
            <span style={{background:"rgba(99,102,241,.12)",color:"#a78bfa",fontSize:11,padding:"3px 10px",borderRadius:10,fontWeight:700}}>{q.type==="mcq"?"Single Correct":q.type==="mcq_multi"?"Multiple Correct":"Numerical"}</span>
            <span style={{fontSize:13,color:"#22c55e",fontWeight:700}}>+{q.marks}</span>
            <span style={{fontSize:13,color:"#ef4444",fontWeight:700}}>-{q.negMarks||0}</span>
          </div>
          <div style={{fontSize:17,color:"#f9fafb",lineHeight:1.8,marginBottom:28}}>{q.text}</div>
          {(q.type==="mcq"||q.type==="mcq_multi")&&(<div style={{display:"flex",flexDirection:"column",gap:10}}>{q.options.map((o,i)=>{const sel=q.type==="mcq_multi"?(Array.isArray(answers[q.id])&&answers[q.id].includes(i)):answers[q.id]===i;return(<button key={i} onClick={()=>ans(i)} style={{display:"flex",alignItems:"center",gap:14,background:sel?"rgba(99,102,241,.15)":"rgba(255,255,255,.03)",border:"1px solid "+(sel?"rgba(99,102,241,.4)":"rgba(255,255,255,.07)"),borderRadius:10,padding:"13px 18px",cursor:"pointer",textAlign:"left",fontSize:15,color:sel?"#a78bfa":"#e5e7eb",width:"100%",transition:"all .15s"}}><span style={{width:30,height:30,borderRadius:"50%",background:sel?"rgba(99,102,241,.3)":"rgba(255,255,255,.07)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:800,flexShrink:0,color:sel?"#a78bfa":"#6b7280"}}>{String.fromCharCode(65+i)}</span><span>{o||<em style={{color:"#374151"}}>{"Option "+String.fromCharCode(65+i)}</em>}</span></button>);})}</div>)}
          {q.type==="numerical"&&<input style={{background:"rgba(255,255,255,.05)",border:"1px solid rgba(255,255,255,.1)",borderRadius:10,padding:"13px 18px",color:"#f9fafb",fontSize:22,fontWeight:700,outline:"none",width:220,fontFamily:"monospace"}} type="number" placeholder="Your answer" value={answers[q.id]||""} onChange={e=>ans(e.target.value)}/>}
          {adminAlerts.length>0&&(<div style={{marginTop:22,borderTop:"1px solid rgba(255,255,255,.05)",paddingTop:14}}><div style={{fontSize:11,color:"#374151",textTransform:"uppercase",letterSpacing:"1px",marginBottom:8,fontWeight:700}}>Admin Messages</div>{adminAlerts.slice(0,3).map(a=>{const ac=AC[a.type]||AC.info;return(<div key={a.id} style={{background:ac.bg,border:"1px solid "+ac.bd,borderRadius:7,padding:"8px 12px",marginBottom:5,display:"flex",alignItems:"center",gap:8}}><span>{ac.i}</span><span style={{fontSize:12,color:ac.c,fontWeight:600}}>{a.message}</span><span style={{fontSize:10,color:"#374151",marginLeft:"auto"}}>{timeAgo(a.created_at)}</span></div>);})}</div>)}
          <div style={{display:"flex",alignItems:"center",gap:10,marginTop:24,flexWrap:"wrap"}}>
            <button style={{background:"none",border:"1px solid rgba(255,255,255,.08)",borderRadius:7,padding:"7px 14px",color:"#4b5563",cursor:"pointer",fontSize:13}} onClick={clearAns}>Clear</button>
            <button onClick={()=>setFlags(f=>({...f,[q.id]:!f[q.id]}))} style={{background:flags[q.id]?"rgba(180,83,9,.2)":"rgba(180,83,9,.08)",border:"1px solid "+(flags[q.id]?"rgba(180,83,9,.4)":"rgba(180,83,9,.15)"),borderRadius:7,padding:"7px 14px",color:"#d97706",cursor:"pointer",fontSize:13,display:"flex",alignItems:"center",gap:5}}>{Ico.flag} {flags[q.id]?"Unflag":"Flag"}</button>
            <div style={{marginLeft:"auto",display:"flex",gap:6}}>
              <button disabled={cur===0} onClick={()=>go(cur-1)} style={{background:"rgba(99,102,241,.08)",border:"1px solid rgba(99,102,241,.15)",borderRadius:7,padding:"7px 16px",color:"#a78bfa",cursor:"pointer",fontSize:13,fontWeight:600}}>← Prev</button>
              <button disabled={cur===questions.length-1} onClick={()=>go(cur+1)} style={{background:"rgba(99,102,241,.08)",border:"1px solid rgba(99,102,241,.15)",borderRadius:7,padding:"7px 16px",color:"#a78bfa",cursor:"pointer",fontSize:13,fontWeight:600}}>Next →</button>
            </div>
          </div>
        </div>
        <div style={{width:208,background:"rgba(0,0,0,.3)",borderLeft:"1px solid rgba(255,255,255,.05)",padding:13,overflowY:"auto",flexShrink:0}}>
          <div style={{fontSize:11,fontWeight:800,color:"#374151",textTransform:"uppercase",letterSpacing:"1.5px",marginBottom:10}}>Palette</div>
          <div style={{display:"flex",flexDirection:"column",gap:3,marginBottom:12}}>{[["Answered","#14532d"],["Not Visited","#7f1d1d"],["Flagged","#78350f"],["Flag+Ans","#581c87"],["Unattempted","#1f2937"]].map(([k,v])=>(<div key={k} style={{display:"flex",alignItems:"center",gap:6,fontSize:11,color:"#374151"}}><div style={{width:9,height:9,borderRadius:3,background:v,flexShrink:0}}/>{k}</div>))}</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:4,marginBottom:12}}>{questions.map((_,i)=>(<button key={i} onClick={()=>go(i)} style={{width:32,height:32,borderRadius:6,border:i===cur?"2px solid #a78bfa":"1px solid rgba(255,255,255,.08)",background:SC[qSt(i)],color:"#fff",fontSize:11,fontWeight:700,cursor:"pointer"}}>{i+1}</button>))}</div>
          <div style={{fontSize:12,marginBottom:12}}>
            <div style={{color:"#22c55e",marginBottom:3}}>✓ {answered} answered</div>
            <div style={{color:"#ef4444",marginBottom:3}}>✗ {questions.length-answered} left</div>
            {violations.length>0&&<div style={{color:"#fca5a5"}}>⚠ {violations.length} violation{violations.length>1?"s":""}</div>}
          </div>
          <button style={{...C.btn,width:"100%",justifyContent:"center",background:"#dc2626",marginBottom:6,padding:"8px"}} onClick={()=>setConfirm(true)}>Submit Exam</button>
          {!isFS&&<button onClick={reFS} style={{width:"100%",background:"rgba(99,102,241,.08)",border:"1px solid rgba(99,102,241,.15)",borderRadius:7,padding:"7px",color:"#a78bfa",cursor:"pointer",fontSize:12,fontWeight:600}}>↑ Fullscreen</button>}
        </div>
      </div>
      {confirm&&(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.88)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}}><div style={{background:"#0f0f1c",border:"1px solid rgba(255,255,255,.08)",borderRadius:18,padding:32,maxWidth:360,width:"90%",animation:"popIn .2s ease"}}><div style={{fontSize:20,fontWeight:800,color:"#f9fafb",marginBottom:10}}>Submit Exam?</div><div style={{color:"#6b7280",lineHeight:2,marginBottom:16}}>Answered: <strong style={{color:"#22c55e"}}>{answered}</strong> · Remaining: <strong style={{color:"#ef4444"}}>{questions.length-answered}</strong><br/>{violations.length>0&&<span style={{color:"#fca5a5"}}>⚠ {violations.length} violation(s) will be reported.<br/></span>}You cannot change answers after submitting.</div><div style={{display:"flex",gap:10,justifyContent:"flex-end"}}><Btn ghost onClick={()=>setConfirm(false)}>Continue</Btn><button style={{...C.btn,background:"#dc2626"}} disabled={submitting} onClick={()=>doSubmit(null)}>{submitting?"Submitting...":"Submit Now"}</button></div></div></div>)}
    </div>
  );
}

// ── SHARED UI ─────────────────────────────────────────────────────────────────
function Page({title,sub,action,children}){return(<div style={{maxWidth:960,animation:"fadeIn .25s ease"}}>{(title||action)&&(<div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:22}}><div><div style={{fontSize:20,fontWeight:800,color:"#f9fafb"}}>{title}</div>{sub&&<div style={{fontSize:12,color:"#374151",marginTop:2}}>{sub}</div>}</div>{action&&<div>{action}</div>}</div>)}{children}</div>);}
function Fld({label,children}){return <div style={{marginBottom:14}}><label style={{display:"block",fontSize:11,color:"#4b5563",textTransform:"uppercase",letterSpacing:".5px",marginBottom:6,fontWeight:700}}>{label}</label>{children}</div>;}
function G2({children}){return <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>{children}</div>;}
function SL({children}){return <div style={{fontSize:11,fontWeight:700,color:"#374151",textTransform:"uppercase",letterSpacing:"1px",marginBottom:8,marginTop:4}}>{children}</div>;}
function Empty({text}){return <div style={{color:"#374151",fontSize:13,padding:"24px 0",textAlign:"center",border:"1px dashed rgba(255,255,255,.05)",borderRadius:10}}>{text}</div>;}
function Loader(){return <div style={{display:"flex",alignItems:"center",justifyContent:"center",padding:"36px 0",gap:10,color:"#374151",fontSize:13}}><div style={{width:16,height:16,border:"2px solid rgba(99,102,241,.2)",borderTop:"2px solid #a78bfa",borderRadius:"50%",animation:"spin 1s linear infinite"}}/>Loading...</div>;}
function Badge({label,color}){const m={green:["rgba(34,197,94,.12)","#22c55e"],blue:["rgba(96,165,250,.12)","#60a5fa"],gray:["rgba(107,114,128,.15)","#6b7280"],red:["rgba(239,68,68,.12)","#ef4444"],yellow:["rgba(234,179,8,.12)","#eab308"],purple:["rgba(168,85,247,.12)","#a78bfa"]};const c=m[color]||m.gray;return <span style={{background:c[0],color:c[1],borderRadius:5,padding:"2px 8px",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>{label}</span>;}
function Btn({children,onClick,primary,ghost,danger,disabled}){let bg="rgba(255,255,255,.04)",bd="1px solid rgba(255,255,255,.08)",col="#6b7280";if(primary){bg="linear-gradient(135deg,#6366f1,#8b5cf6)";bd="none";col="#fff";}if(danger){bg="rgba(239,68,68,.08)";bd="1px solid rgba(239,68,68,.15)";col="#ef4444";}return <button disabled={disabled} style={{background:bg,border:bd,borderRadius:7,padding:"8px 14px",color:col,fontWeight:600,fontSize:13,cursor:"pointer",display:"inline-flex",alignItems:"center",gap:5,opacity:disabled?.5:1,transition:"all .15s"}} onClick={onClick}>{children}</button>;}

const C={
  btn:    {background:"linear-gradient(135deg,#6366f1,#8b5cf6)",border:"none",borderRadius:8,padding:"9px 18px",color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer",display:"inline-flex",alignItems:"center",gap:6},
  btnGhost:{background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.08)",borderRadius:7,padding:"8px 14px",color:"#6b7280",fontWeight:600,fontSize:13,cursor:"pointer"},
  inp:    {width:"100%",background:"rgba(255,255,255,.05)",border:"1px solid rgba(255,255,255,.08)",borderRadius:8,padding:"10px 12px",color:"#f9fafb",fontSize:14,outline:"none",boxSizing:"border-box",fontFamily:"inherit"},
  chip:   {background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.07)",borderRadius:20,padding:"7px 14px",color:"#6b7280",cursor:"pointer",fontSize:13,display:"inline-flex",alignItems:"center",transition:"all .15s"},
  chipOn: {background:"rgba(99,102,241,.15)",borderColor:"rgba(99,102,241,.35)",color:"#a78bfa"},
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
