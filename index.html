async function sbFetch(method, table, query, body) {
  const url = `${SB_URL}/rest/v1/${table}${query?"?"+query:""}`;
  const opts = { method, headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":"application/json","Prefer":"return=representation"} };
  if(body!==undefined) opts.body=JSON.stringify(body);
  const res = await fetch(url,opts);
  const text = await res.text();
  if(!res.ok) throw new Error(text||res.statusText);
  if(!text||text==="null") return [];
  try{return JSON.parse(text);}catch{return [];}
}
const dbGet    = (t,q)   => sbFetch("GET",   t,q);
const dbInsert = (t,d)   => sbFetch("POST",  t,"",d);
const dbUpdate = (t,m,d) => sbFetch("PATCH", t,Object.entries(m).map(([k,v])=>`${k}=eq.${encodeURIComponent(v)}`).join("&"),d);
const dbDelete = (t,m)   => sbFetch("DELETE",t,Object.entries(m).map(([k,v])=>`${k}=eq.${encodeURIComponent(v)}`).join("&"));

function timeAgo(d) {
  const s=Math.floor((Date.now()-new Date(d))/1000);
  if(s<60)  return s+"s ago";
  if(s<3600) return Math.floor(s/60)+"m ago";

}

// ── CONNECTION CHECK ───────────────────────────────────────────────────────────
function ConnectCheck({ onReady }) {
  const [st,setSt]=useState("checking"); const [err,setErr]=useState("");
  async function check(){setSt("checking");setErr("");try{await dbGet("admin","select=id&limit=1");setSt("ok");setTimeout(()=>onReady(),500);}catch(e){setSt("error");setErr(e.message);}}
  useEffect(()=>{check();},[]);
  if(st==="ok") return <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:"#07070f",flexDirection:"column",gap:12}}><div style={{fontSize:40}}>✅</div><div style={{color:"#22c55e",fontWeight:700,fontSize:18}}>Connected!</div></div>;
  if(st==="checking") return <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:"#07070f",flexDirection:"column",gap:16}}><div style={{width:40,height:40,border:"3px solid rgba(99,102,241,.2)",borderTop:"3px solid #a78bfa",borderRadius:"50%",animation:"spin 1s linear infinite"}}/><div style={{color:"#4b5563",fontSize:14}}>Connecting to database...</div></div>;
  return <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:"#07070f",flexDirection:"column",gap:16,padding:24}}><div style={{fontSize:40}}>❌</div><div style={{color:"#ef4444",fontWeight:700,fontSize:20}}>Connection Failed</div><div style={{color:"#6b7280",fontSize:13,maxWidth:380,textAlign:"center",lineHeight:1.8}}>{err}</div><button onClick={check} style={{...Sty.btn,marginTop:8}}>Retry Connection</button></div>;
}

function App() {
  const [ready,setReady]=useState(false); const [session,setSession]=useState(null); const [screen,setScreen]=useState("home");

    <div style={{minHeight:"100vh",background:"#07070f"}}>

    </div>
  );
}

// ── LOGIN PAGE ────────────────────────────────────────────────────────────────
function LoginPage({ role, onBack, onLogin }) {
  const [u,setU]=useState(""); const [p,setP]=useState(""); const [err,setErr]=useState(""); const [loading,setLoading]=useState(false);
  async function submit(){
    setErr(""); setLoading(true);
    try{
      if(role==="admin"){const rows=await dbGet("admin","select=username,password");if(!rows?.length||!rows.find(r=>r.username===u&&r.password===p)){setErr("Wrong username or password.");setLoading(false);return;}onLogin();}
      else{const rows=await dbGet("candidates",`select=*&username=eq.${encodeURIComponent(u)}`);if(!rows?.length){setErr("No account found.");setLoading(false);return;}const m=rows.find(r=>r.password===p);if(!m){setErr("Wrong password.");setLoading(false);return;}onLogin({id:m.id,name:m.name,username:m.username,email:m.email});}
    }catch(e){setErr("Error: "+e.message);}
    setLoading(false);
  }
  return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",padding:24}}>
      <div style={{background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.08)",borderRadius:18,padding:36,width:"100%",maxWidth:380,animation:"fadeIn .3s ease"}}>
        <button style={{background:"none",border:"none",color:"#4b5563",cursor:"pointer",fontSize:13,marginBottom:20,padding:0,display:"flex",alignItems:"center",gap:4}} onClick={onBack}>← Back</button>
        <div style={{fontSize:24,fontWeight:800,color:"#f9fafb",marginBottom:3}}>{role==="admin"?"Admin Login":"Candidate Login"}</div>
        <div style={{fontSize:12,color:"#4b5563",marginBottom:24}}>{role==="candidate"?"Use credentials from your admin":"Enter your admin credentials"}</div>
        <Field label="Username"><input style={Sty.inp} value={u} autoFocus onChange={e=>setU(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()} placeholder="Username"/></Field>
        <Field label="Password"><input style={Sty.inp} type="password" value={p} onChange={e=>setP(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()} placeholder="Password"/></Field>
        {err&&<div style={{color:"#ef4444",fontSize:13,padding:"8px 12px",background:"rgba(239,68,68,.08)",borderRadius:8,marginBottom:10}}>{err}</div>}
        <button style={{...Sty.btn,width:"100%",justifyContent:"center",marginTop:4}} onClick={submit} disabled={loading}>{loading?"Please wait...":"Login"}</button>
      </div>
    </div>
  );
}

// ── LOGIN PAGE ────────────────────────────────────────────────────────────────
function LoginPage({ role, onBack, onLogin }) {
  const [u,setU]=useState(""); const [p,setP]=useState(""); const [err,setErr]=useState(""); const [loading,setLoading]=useState(false);
  async function submit(){
    setErr(""); setLoading(true);
    try{
      if(role==="admin"){const rows=await dbGet("admin","select=username,password");if(!rows?.length||!rows.find(r=>r.username===u&&r.password===p)){setErr("Wrong username or password.");setLoading(false);return;}onLogin();}
      else{const rows=await dbGet("candidates",`select=*&username=eq.${encodeURIComponent(u)}`);if(!rows?.length){setErr("No account found.");setLoading(false);return;}const m=rows.find(r=>r.password===p);if(!m){setErr("Wrong password.");setLoading(false);return;}onLogin({id:m.id,name:m.name,username:m.username,email:m.email});}
    }catch(e){setErr("Error: "+e.message);}
    setLoading(false);
  }
  return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",padding:24}}>
      <div style={{background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.08)",borderRadius:18,padding:36,width:"100%",maxWidth:380,animation:"fadeIn .3s ease"}}>
        <button style={{background:"none",border:"none",color:"#4b5563",cursor:"pointer",fontSize:13,marginBottom:20,padding:0,display:"flex",alignItems:"center",gap:4}} onClick={onBack}>← Back</button>
        <div style={{fontSize:24,fontWeight:800,color:"#f9fafb",marginBottom:3}}>{role==="admin"?"Admin Login":"Candidate Login"}</div>
        <div style={{fontSize:12,color:"#4b5563",marginBottom:24}}>{role==="candidate"?"Use credentials from your admin":"Enter your admin credentials"}</div>
        <Field label="Username"><input style={Sty.inp} value={u} autoFocus onChange={e=>setU(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()} placeholder="Username"/></Field>
        <Field label="Password"><input style={Sty.inp} type="password" value={p} onChange={e=>setP(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()} placeholder="Password"/></Field>
        {err&&<div style={{color:"#ef4444",fontSize:13,padding:"8px 12px",background:"rgba(239,68,68,.08)",borderRadius:8,marginBottom:10}}>{err}</div>}
        <button style={{...Sty.btn,width:"100%",justifyContent:"center",marginTop:4}} onClick={submit} disabled={loading}>{loading?"Please wait...":"Login"}</button>
      </div>
    </div>
  );
}

  useEffect(()=>{
    (async()=>{
      try{

          dbGet("quizzes","select=id,title,status,results_released,created_at&order=created_at.desc"),

          dbGet("submissions","select=id,quiz_id,candidate_id,graded,score,submitted_at&order=submitted_at.desc&limit=50"),
          dbGet("announcements","select=id,active"),

          quizzes:q?.length||0,

  );

// ── LIVE MONITOR ──────────────────────────────────────────────────────────────
function LiveMonitor() {
  const [quizzes,setQuizzes]=useState([]); const [selQuiz,setSelQuiz]=useState(null); const [sessions,setSessions]=useState([]); const [candidates,setCandidates]=useState([]); const [alerts,setAlerts]=useState([]); const [loading,setLoading]=useState(true); const [alertMsg,setAlertMsg]=useState(""); const [alertType,setAlertType]=useState("warning"); const [targetCand,setTargetCand]=useState("all"); const [sending,setSending]=useState(false); const [lastRefresh,setLastRefresh]=useState(null);
  const refreshRef=useRef(null);
  async function loadQuizzes(){try{const [q,c]=await Promise.all([dbGet("quizzes","select=*&status=in.(published,graded)&order=created_at.desc"),dbGet("candidates","select=id,name,username")]);setQuizzes(q||[]);setCandidates(c||[]);}catch(e){console.error(e);}setLoading(false);}
  async function refreshSessions(){if(!selQuiz)return;try{const [sess,alts]=await Promise.all([dbGet("exam_sessions",`select=*&quiz_id=eq.${selQuiz}&order=last_seen.desc`),dbGet("live_alerts",`select=*&quiz_id=eq.${selQuiz}&order=created_at.desc&limit=20`)]);setSessions(sess||[]);setAlerts(alts||[]);setLastRefresh(new Date());}catch(e){console.error(e);}}
  useEffect(()=>{loadQuizzes();},[]);
  useEffect(()=>{refreshSessions();clearInterval(refreshRef.current);if(selQuiz)refreshRef.current=setInterval(refreshSessions,MONITOR_REFRESH);return()=>clearInterval(refreshRef.current);},[selQuiz]);
  async function sendAlert(){if(!alertMsg.trim()||!selQuiz)return;setSending(true);try{await dbInsert("live_alerts",{id:uid(),quiz_id:selQuiz,candidate_id:targetCand==="all"?null:targetCand,message:alertMsg.trim(),type:alertType});setAlertMsg("");await refreshSessions();}catch(e){alert("Error: "+e.message);}setSending(false);}
  const quiz=quizzes.find(q=>q.id===selQuiz); const now=Date.now();
  const online=sessions.filter(s=>s.status==="active"&&(now-new Date(s.last_seen))<ONLINE_THRESH);
  const offline=sessions.filter(s=>s.status!=="active"||(now-new Date(s.last_seen))>=ONLINE_THRESH);
  function getCandName(id){return candidates.find(c=>c.id===id)?.name||id;}
  const AC={warning:{bg:"rgba(234,179,8,.1)",border:"rgba(234,179,8,.4)",color:"#eab308",icon:"⚠️"},urgent:{bg:"rgba(239,68,68,.1)",border:"rgba(239,68,68,.4)",color:"#ef4444",icon:"🚨"},info:{bg:"rgba(99,102,241,.1)",border:"rgba(99,102,241,.4)",color:"#a78bfa",icon:"ℹ️"}};
  return (
    <PageWrap title="Live Monitor" subtitle="Real-time exam supervision">
      {loading&&<Loader/>}
      {!loading&&<>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:20}}>
          {quizzes.length===0&&<Empty text="No published quizzes."/>}
          {quizzes.map(q=>(<button key={q.id} style={{...Sty.chip,...(selQuiz===q.id?Sty.chipOn:{})}} onClick={()=>setSelQuiz(q.id)}>{q.title}</button>))}
        </div>
        {selQuiz&&<>
          <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:12,marginBottom:20}}>
            {[{v:sessions.length,l:"In Exam",c:"#a78bfa"},{v:online.length,l:"Online",c:"#22c55e"},{v:offline.length,l:"Offline",c:"#6b7280"},{v:sessions.reduce((a,s)=>a+(s.violations_count||0),0),l:"Violations",c:"#ef4444"},{v:lastRefresh?timeAgo(lastRefresh):"—",l:"Last Refresh",c:"#f59e0b"}].map(({v,l,c})=>(
              <div key={l} style={{background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.06)",borderRadius:12,padding:"14px 16px",textAlign:"center"}}>
                <div style={{fontSize:22,fontWeight:900,color:c}}>{v}</div>
                <div style={{fontSize:11,color:"#4b5563",marginTop:2}}>{l}</div>
              </div>
            ))}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 360px",gap:16}}>
            <div>
              <SectionLabel>📡 Candidate Status</SectionLabel>
              {sessions.length===0&&<Empty text="No candidates have started yet."/>}
              {sessions.map(s=>{const isOnline=(now-new Date(s.last_seen))<ONLINE_THRESH;const name=getCandName(s.candidate_id);const pct=quiz?(s.answers_count||0)/((quiz.questions||[]).length||1)*100:0;return(
                <div key={s.id} style={{background:"rgba(255,255,255,.02)",border:`1px solid ${isOnline?"rgba(34,197,94,.2)":"rgba(255,255,255,.05)"}`,borderRadius:12,padding:"12px 14px",marginBottom:8}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                    <div style={{width:8,height:8,borderRadius:"50%",background:isOnline?"#22c55e":"#374151",flexShrink:0,animation:isOnline?"pulse 2s infinite":"none"}}/>
                    <span style={{fontWeight:600,color:"#f9fafb",flex:1,fontSize:14}}>{name}</span>
                    <Badge label={isOnline?"Online":"Offline"} color={isOnline?"green":"gray"}/>
                    {(s.violations_count||0)>0&&<Badge label={`${s.violations_count} ⚠`} color="red"/>}
                    <button onClick={()=>{setTargetCand(s.candidate_id);setAlertMsg("");}} style={{background:"rgba(234,179,8,.1)",border:"1px solid rgba(234,179,8,.2)",borderRadius:6,padding:"3px 8px",color:"#eab308",cursor:"pointer",fontSize:11,fontWeight:600}}>Flag</button>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <div style={{flex:1,background:"rgba(255,255,255,.05)",borderRadius:4,height:4,overflow:"hidden"}}><div style={{width:pct+"%",height:"100%",background:"linear-gradient(90deg,#6366f1,#8b5cf6)",transition:"width .5s"}}/></div>
                    <span style={{fontSize:11,color:"#4b5563"}}>{s.answers_count||0}/{(quiz?.questions||[]).length||0}</span>
                    <span style={{fontSize:11,color:"#374151"}}>{timeAgo(s.last_seen)}</span>
                  </div>
                </div>
              );})}
            </div>
            <div>
              <SectionLabel>📨 Send Live Alert</SectionLabel>
              <div style={{background:"rgba(255,255,255,.02)",border:"1px solid rgba(255,255,255,.06)",borderRadius:12,padding:16,marginBottom:14}}>
                <Field label="Send To"><select style={Sty.inp} value={targetCand} onChange={e=>setTargetCand(e.target.value)}><option value="all">📢 All Candidates</option>{sessions.map(s=>(<option key={s.id} value={s.candidate_id}>{getCandName(s.candidate_id)}</option>))}</select></Field>
                <Field label="Type"><select style={Sty.inp} value={alertType} onChange={e=>setAlertType(e.target.value)}><option value="warning">⚠️ Warning</option><option value="urgent">🚨 Urgent</option><option value="info">ℹ️ Info</option></select></Field>
                <Field label="Message"><textarea style={{...Sty.inp,minHeight:70,resize:"vertical"}} value={alertMsg} onChange={e=>setAlertMsg(e.target.value)} placeholder="Message..."/></Field>
                <button onClick={sendAlert} disabled={sending||!alertMsg.trim()} style={{...Sty.btn,width:"100%",justifyContent:"center",background:"linear-gradient(135deg,#d97706,#b45309)"}}>{I.send} {sending?"Sending...":"Send Alert"}</button>
              </div>
              <SectionLabel>Recent Alerts</SectionLabel>
              {alerts.length===0&&<div style={{color:"#374151",fontSize:13,textAlign:"center",padding:"12px 0"}}>No alerts sent.</div>}
              <div style={{display:"flex",flexDirection:"column",gap:6,maxHeight:280,overflowY:"auto"}}>

        <Field label="Question"><textarea style={{...Sty.inp,minHeight:70}} value={nq.text} onChange={e=>setNq(q=>({...q,text:e.target.value}))} placeholder="Question..."/></Field>

        {nq.type==="numerical"&&<Field label="Correct Answer"><input style={Sty.inp} value={nq.answer||""} onChange={e=>setNq(q=>({...q,answer:e.target.value}))} placeholder="Exact number"/></Field>}

function ResultsManager() {
  const [quizzes,setQuizzes]=useState([]); const [candidates,setCandidates]=useState([]); const [subs,setSubs]=useState([]); const [sel,setSel]=useState(null); const [loading,setLoading]=useState(true); const [working,setWorking]=useState(false);
  async function load(){setLoading(true);try{const [q,c,s]=await Promise.all([dbGet("quizzes","select=*&order=created_at.desc"),dbGet("candidates","select=id,name,username"),dbGet("submissions","select=*&order=submitted_at.desc")]);setQuizzes((q||[]).map(x=>({...x,scheduledFor:x.scheduled_for,resultsReleased:x.results_released})));setCandidates(c||[]);setSubs(s||[]);}catch(e){console.error(e);}setLoading(false);}
  useEffect(()=>{load();},[]);
  const quiz=quizzes.find(q=>q.id===sel); const quizSubs=subs.filter(s=>s.quiz_id===sel); const totalM=quiz?(quiz.questions||[]).reduce((a,q)=>a+q.marks,0):0;
  function gradeOne(sub,questions){const ans=sub.answers||{};let score=0;for(const q of questions){const a=ans[q.id];if(a===undefined||a===null||a==="")continue;if(q.type==="mcq"){if(+a===q.correct)score+=q.marks;else score-=(q.negMarks||0);}else if(q.type==="mcq_multi"){const cor=[...(Array.isArray(q.correct)?q.correct:[q.correct])].sort().join(",");const giv=[...(Array.isArray(a)?a:[a])].sort().join(",");if(cor===giv)score+=q.marks;else score-=(q.negMarks||0);}else{if(String(a).trim()===String(q.answer).trim())score+=q.marks;else score-=(q.negMarks||0);}}return Math.max(0,score);}
  async function gradeAll(){if(!quiz)return;setWorking(true);try{for(const s of quizSubs){const sc=gradeOne(s,quiz.questions||[]);await dbUpdate("submissions",{id:s.id},{score:sc,graded:true});}await dbUpdate("quizzes",{id:sel},{status:"graded"});await load();}catch(e){alert(e.message);}setWorking(false);}
  async function release(){setWorking(true);try{await dbUpdate("quizzes",{id:sel},{results_released:true});await load();}catch(e){alert(e.message);}setWorking(false);}
  return (
    <PageWrap title="Results & Grading" subtitle="Grade and release scores">
      {loading&&<Loader/>}
      {!loading&&<>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:20}}>{quizzes.length===0&&<Empty text="No quizzes yet."/>}{quizzes.map(q=>(<button key={q.id} style={{...Sty.chip,...(sel===q.id?Sty.chipOn:{})}} onClick={()=>setSel(q.id)}>{q.title}<span style={{background:"rgba(255,255,255,.08)",borderRadius:10,padding:"1px 7px",fontSize:11,marginLeft:6}}>{subs.filter(s=>s.quiz_id===q.id).length}</span></button>))}</div>
        {quiz&&<>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14,flexWrap:"wrap",padding:"12px 16px",background:"rgba(255,255,255,.02)",borderRadius:12,border:"1px solid rgba(255,255,255,.06)"}}>
            <span style={{fontWeight:700,color:"#f9fafb",flex:1}}>{quiz.title}</span>
            <span style={{color:"#4b5563",fontSize:13}}>Total: {totalM} marks</span>
            <Badge label={quiz.status||"draft"} color={quiz.status==="graded"?"blue":"gray"}/>
            {quiz.resultsReleased&&<Badge label="Released" color="green"/>}
          </div>
          <div style={{display:"flex",gap:8,marginBottom:16}}><Btn primary onClick={gradeAll}>{working?"Working...":"⚡ Auto-Grade All"}</Btn>{quiz.status==="graded"&&!quiz.resultsReleased&&(<button style={{...Sty.btn,background:"#15803d"}} onClick={release} disabled={working}>{working?"Working...":"🚀 Release to Candidates"}</button>)}</div>
          {quizSubs.length===0&&<Empty text="No submissions yet."/>}
          {quizSubs.length>0&&(
            <div style={{border:"1px solid rgba(255,255,255,.06)",borderRadius:12,overflow:"hidden"}}>
              <div style={{display:"grid",gridTemplateColumns:"2fr 2fr 1fr 1fr 1fr",padding:"10px 16px",background:"rgba(255,255,255,.03)",fontWeight:700,color:"#4b5563",fontSize:11,textTransform:"uppercase",letterSpacing:"1px"}}><div>Candidate</div><div>Submitted</div><div>Score</div><div>Status</div><div>Violations</div></div>

// ── ATTEMPT ───────────────────────────────────────────────────────────────────
function Attempt({ quiz, user, onSubmit }) {
  const [cur,setCur]=useState(0); const [answers,setAnswers]=useState({}); const [flags,setFlags]=useState({}); const [visited,setVisited]=useState({0:true}); const [secs,setSecs]=useState(quiz.duration*60); const [confirm,setConfirm]=useState(false); const [submitting,setSubmitting]=useState(false); const [violations,setViolations]=useState([]); const [toast,setToast]=useState(null); const [isFS,setIsFS]=useState(false); const [adminAlerts,setAdminAlerts]=useState([]); const [alertPopup,setAlertPopup]=useState(null);
  const timerRef=useRef(null); const violRef=useRef([]); const ansRef=useRef({}); const doneRef=useRef(false); const heartbeatRef=useRef(null); const alertPollRef=useRef(null); const sessionIdRef=useRef(uid()); const lastAlertRef=useRef(null);
  useEffect(()=>{violRef.current=violations;},[violations]);
  useEffect(()=>{ansRef.current=answers;},[answers]);
  async function upsertSession(extra={}){try{await sbFetch("POST","exam_sessions?on_conflict=candidate_id,quiz_id","",{id:sessionIdRef.current,candidate_id:user.id,quiz_id:quiz.id,last_seen:new Date().toISOString(),answers_count:Object.keys(ansRef.current).filter(k=>{const a=ansRef.current[k];return a!==undefined&&a!==""&&!(Array.isArray(a)&&a.length===0);}).length,violations_count:violRef.current.length,status:"active",...extra});}catch(e){console.warn(e.message);}}
  async function pollAlerts(){try{const rows=await dbGet("live_alerts",`select=*&quiz_id=eq.${quiz.id}&order=created_at.desc&limit=10`);const rel=(rows||[]).filter(a=>a.candidate_id===null||a.candidate_id===user.id);if(rel.length>0){const newest=rel[0];if(lastAlertRef.current!==newest.id){lastAlertRef.current=newest.id;setAlertPopup(newest);setAdminAlerts(rel);setTimeout(()=>setAlertPopup(null),8000);}}}catch(e){console.warn(e.message);}}
  useEffect(()=>{upsertSession();heartbeatRef.current=setInterval(()=>upsertSession(),HEARTBEAT);alertPollRef.current=setInterval(pollAlerts,ALERT_POLL);pollAlerts();return()=>{clearInterval(heartbeatRef.current);clearInterval(alertPollRef.current);};},[]);
  useEffect(()=>{const el=document.documentElement;const fn=el.requestFullscreen||el.webkitRequestFullscreen||el.mozRequestFullScreen;if(fn)fn.call(el).then(()=>setIsFS(true)).catch(()=>{});const chg=()=>{const f=!!(document.fullscreenElement||document.webkitFullscreenElement);setIsFS(f);if(!f&&!doneRef.current)addV("Exited fullscreen");};document.addEventListener("fullscreenchange",chg);document.addEventListener("webkitfullscreenchange",chg);return()=>{document.removeEventListener("fullscreenchange",chg);document.removeEventListener("webkitfullscreenchange",chg);if(document.fullscreenElement)document.exitFullscreen&&document.exitFullscreen();};},[]);
  useEffect(()=>{const fn=()=>{if(document.hidden&&!doneRef.current)addV("Switched tab");};document.addEventListener("visibilitychange",fn);return()=>document.removeEventListener("visibilitychange",fn);},[]);
  useEffect(()=>{const fn=()=>{if(!doneRef.current)addV("Window lost focus");};window.addEventListener("blur",fn);return()=>window.removeEventListener("blur",fn);},[]);
  useEffect(()=>{const fn=e=>{if(e.ctrlKey||e.metaKey||e.key==="F12"||e.key==="PrintScreen"){e.preventDefault();e.stopPropagation();if(!doneRef.current)addV("Blocked key: "+e.key);}};document.addEventListener("keydown",fn,true);return()=>document.removeEventListener("keydown",fn,true);},[]);
  useEffect(()=>{const cp=e=>{e.preventDefault();if(!doneRef.current)addV("Copy");};const ps=e=>{e.preventDefault();if(!doneRef.current)addV("Paste");};const rc=e=>{e.preventDefault();if(!doneRef.current)addV("Right-click");};document.addEventListener("copy",cp);document.addEventListener("paste",ps);document.addEventListener("contextmenu",rc);return()=>{document.removeEventListener("copy",cp);document.removeEventListener("paste",ps);document.removeEventListener("contextmenu",rc);};},[]);
  useEffect(()=>{timerRef.current=setInterval(()=>{setSecs(s=>{if(s<=1){clearInterval(timerRef.current);doSubmit("Time expired");return 0;}return s-1;});},1000);return()=>clearInterval(timerRef.current);},[]);
  function addV(type){if(doneRef.current)return;const v={type,time:new Date().toISOString()};const upd=[...violRef.current,v];violRef.current=upd;setViolations(upd);setToast({msg:type,count:upd.length,left:MAX_WARN-upd.length});setTimeout(()=>setToast(null),4000);if(upd.length>=MAX_WARN)doSubmit("Auto-submitted: too many violations");}
  async function doSubmit(reason){if(doneRef.current)return;doneRef.current=true;clearInterval(timerRef.current);clearInterval(heartbeatRef.current);clearInterval(alertPollRef.current);setSubmitting(true);await upsertSession({status:"submitted"});const v=reason?[...violRef.current,{type:reason,time:new Date().toISOString()}]:violRef.current;await onSubmit(ansRef.current,v);setSubmitting(false);}
  function reFS(){const el=document.documentElement;const fn=el.requestFullscreen||el.webkitRequestFullscreen;if(fn)fn.call(el).then(()=>setIsFS(true)).catch(()=>{});}
  const questions=quiz.questions||[]; const q=questions[cur]; const mm=String(Math.floor(secs/60)).padStart(2,"0"); const ss=String(secs%60).padStart(2,"0"); const urgent=secs<300;
  function go(i){setCur(i);setVisited(v=>({...v,[i]:true}));}
  function ans(val){if(q.type==="mcq_multi"){const p=Array.isArray(answers[q.id])?answers[q.id]:[];setAnswers(a=>({...a,[q.id]:p.includes(val)?p.filter(x=>x!==val):[...p,val]}));}else setAnswers(a=>({...a,[q.id]:val}));}
  function clearAns(){setAnswers(a=>{const n={...a};delete n[q.id];return n;});}
  function qSt(i){const qi=questions[i];const a=answers[qi.id];const has=a!==undefined&&a!==""&&!(Array.isArray(a)&&a.length===0);const fl=flags[qi.id];if(fl&&has)return"fa";if(fl)return"f";if(has)return"a";if(visited[i])return"v";return"n";}
  const SC={n:"#1f2937",v:"#7f1d1d",a:"#14532d",f:"#78350f",fa:"#581c87"};
  const answered=questions.filter((_,i)=>{const a=answers[questions[i].id];return a!==undefined&&a!==""&&!(Array.isArray(a)&&a.length===0);}).length;
  const AC={warning:{bg:"rgba(234,179,8,.15)",border:"rgba(234,179,8,.5)",color:"#eab308",icon:"⚠️"},urgent:{bg:"rgba(239,68,68,.15)",border:"rgba(239,68,68,.5)",color:"#ef4444",icon:"🚨"},info:{bg:"rgba(99,102,241,.15)",border:"rgba(99,102,241,.5)",color:"#a78bfa",icon:"ℹ️"}};

      {!isFS&&(<div style={{background:"rgba(220,38,38,.12)",borderBottom:"1px solid rgba(220,38,38,.25)",padding:"6px 20px",display:"flex",alignItems:"center",gap:10,fontSize:13}}><span style={{color:"#fca5a5"}}>⚠ Not in fullscreen.</span><button onClick={reFS} style={{background:"#dc2626",border:"none",borderRadius:5,padding:"3px 10px",color:"#fff",cursor:"pointer",fontSize:12,fontWeight:700}}>Go Fullscreen</button></div>)}
      <div style={{display:"flex",alignItems:"center",padding:"10px 20px",background:"rgba(0,0,0,.6)",borderBottom:"1px solid rgba(255,255,255,.06)",gap:14,position:"sticky",top:0,zIndex:50,backdropFilter:"blur(10px)"}}>

          </div>
          <div style={{fontSize:17,color:"#f9fafb",lineHeight:1.8,marginBottom:28}}>{q.text}</div>
          {(q.type==="mcq"||q.type==="mcq_multi")&&(<div style={{display:"flex",flexDirection:"column",gap:10}}>{q.options.map((o,i)=>{const sel=q.type==="mcq_multi"?(Array.isArray(answers[q.id])&&answers[q.id].includes(i)):answers[q.id]===i;return(<button key={i} onClick={()=>ans(i)} style={{display:"flex",alignItems:"center",gap:14,background:sel?"rgba(99,102,241,.15)":"rgba(255,255,255,.03)",border:`1px solid ${sel?"rgba(99,102,241,.4)":"rgba(255,255,255,.07)"}`,borderRadius:10,padding:"13px 18px",cursor:"pointer",textAlign:"left",fontSize:15,color:sel?"#a78bfa":"#e5e7eb",width:"100%",transition:"all .15s"}}><span style={{width:30,height:30,borderRadius:"50%",background:sel?"rgba(99,102,241,.3)":"rgba(255,255,255,.07)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:800,flexShrink:0,color:sel?"#a78bfa":"#6b7280"}}>{String.fromCharCode(65+i)}</span><span>{o||<em style={{color:"#374151"}}>Option {String.fromCharCode(65+i)}</em>}</span></button>);})}</div>)}
          {q.type==="numerical"&&<input style={{background:"rgba(255,255,255,.05)",border:"1px solid rgba(255,255,255,.1)",borderRadius:10,padding:"13px 18px",color:"#f9fafb",fontSize:22,fontWeight:700,outline:"none",width:220,fontFamily:"monospace"}} type="number" placeholder="Your answer" value={answers[q.id]??""} onChange={e=>ans(e.target.value)}/>}
          {adminAlerts.length>0&&(<div style={{marginTop:24,borderTop:"1px solid rgba(255,255,255,.05)",paddingTop:16}}><div style={{fontSize:11,color:"#374151",textTransform:"uppercase",letterSpacing:"1px",marginBottom:8,fontWeight:700}}>Admin Messages</div>{adminAlerts.slice(0,3).map(a=>{const ac=AC[a.type]||AC.info;return(<div key={a.id} style={{background:ac.bg,border:`1px solid ${ac.border}`,borderRadius:7,padding:"8px 12px",marginBottom:5,display:"flex",alignItems:"center",gap:8}}><span>{ac.icon}</span><span style={{fontSize:12,color:ac.color,fontWeight:600}}>{a.message}</span><span style={{fontSize:10,color:"#374151",marginLeft:"auto"}}>{timeAgo(a.created_at)}</span></div>);})}</div>)}
          <div style={{display:"flex",alignItems:"center",gap:10,marginTop:24,flexWrap:"wrap"}}>
            <button style={{background:"none",border:"1px solid rgba(255,255,255,.08)",borderRadius:7,padding:"7px 14px",color:"#4b5563",cursor:"pointer",fontSize:13}} onClick={clearAns}>Clear</button>
            <button onClick={()=>setFlags(f=>({...f,[q.id]:!f[q.id]}))} style={{background:flags[q.id]?"rgba(180,83,9,.2)":"rgba(180,83,9,.08)",border:`1px solid ${flags[q.id]?"rgba(180,83,9,.4)":"rgba(180,83,9,.15)"}`,borderRadius:7,padding:"7px 14px",color:"#d97706",cursor:"pointer",fontSize:13,display:"flex",alignItems:"center",gap:5}}>{I.flag} {flags[q.id]?"Unflag":"Flag"}</button>
            <div style={{marginLeft:"auto",display:"flex",gap:6}}>
              <button disabled={cur===0} onClick={()=>go(cur-1)} style={{background:"rgba(99,102,241,.08)",border:"1px solid rgba(99,102,241,.15)",borderRadius:7,padding:"7px 16px",color:"#a78bfa",cursor:"pointer",fontSize:13,fontWeight:600}}>← Prev</button>
              <button disabled={cur===questions.length-1} onClick={()=>go(cur+1)} style={{background:"rgba(99,102,241,.08)",border:"1px solid rgba(99,102,241,.15)",borderRadius:7,padding:"7px 16px",color:"#a78bfa",cursor:"pointer",fontSize:13,fontWeight:600}}>Next →</button>
            </div>
          </div>
        </div>
        <div style={{width:210,background:"rgba(0,0,0,.3)",borderLeft:"1px solid rgba(255,255,255,.05)",padding:14,overflowY:"auto",flexShrink:0}}>
          <div style={{fontSize:11,fontWeight:800,color:"#374151",textTransform:"uppercase",letterSpacing:"1.5px",marginBottom:10}}>Palette</div>
          <div style={{display:"flex",flexDirection:"column",gap:3,marginBottom:12}}>{[["Answered","#14532d"],["Not Visited","#7f1d1d"],["Flagged","#78350f"],["Flag+Ans","#581c87"],["Unattempted","#1f2937"]].map(([k,v])=>(<div key={k} style={{display:"flex",alignItems:"center",gap:6,fontSize:11,color:"#374151"}}><div style={{width:9,height:9,borderRadius:3,background:v,flexShrink:0}}/>{k}</div>))}</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:4,marginBottom:12}}>{questions.map((_,i)=>(<button key={i} onClick={()=>go(i)} style={{width:32,height:32,borderRadius:6,border:i===cur?"2px solid #a78bfa":"1px solid rgba(255,255,255,.08)",background:SC[qSt(i)],color:"#fff",fontSize:11,fontWeight:700,cursor:"pointer"}}>{i+1}</button>))}</div>
          <div style={{fontSize:12,marginBottom:12}}>
            <div style={{color:"#22c55e",marginBottom:3}}>✓ {answered} answered</div>
            <div style={{color:"#ef4444",marginBottom:3}}>✗ {questions.length-answered} left</div>
            {violations.length>0&&<div style={{color:"#fca5a5"}}>⚠ {violations.length} violation{violations.length>1?"s":""}</div>}
          </div>
          <button style={{...Sty.btn,width:"100%",justifyContent:"center",background:"#dc2626",marginBottom:6,padding:"8px"}} onClick={()=>setConfirm(true)}>Submit Exam</button>
          {!isFS&&<button onClick={reFS} style={{width:"100%",background:"rgba(99,102,241,.08)",border:"1px solid rgba(99,102,241,.15)",borderRadius:7,padding:"7px",color:"#a78bfa",cursor:"pointer",fontSize:12,fontWeight:600}}>↑ Fullscreen</button>}
        </div>
      </div>
      {confirm&&(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.88)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}}><div style={{background:"#0f0f1c",border:"1px solid rgba(255,255,255,.08)",borderRadius:18,padding:32,maxWidth:360,width:"90%",animation:"popIn .2s ease"}}><div style={{fontSize:20,fontWeight:800,color:"#f9fafb",marginBottom:10}}>Submit Exam?</div><div style={{color:"#6b7280",lineHeight:2,marginBottom:16}}>Answered: <strong style={{color:"#22c55e"}}>{answered}</strong> · Remaining: <strong style={{color:"#ef4444"}}>{questions.length-answered}</strong><br/>{violations.length>0&&<span style={{color:"#fca5a5"}}>⚠ {violations.length} violation(s) will be reported.<br/></span>}You cannot change answers after submitting.</div><div style={{display:"flex",gap:10,justifyContent:"flex-end"}}><Btn ghost onClick={()=>setConfirm(false)}>Continue</Btn><button style={{...Sty.btn,background:"#dc2626"}} disabled={submitting} onClick={()=>doSubmit(null)}>{submitting?"Submitting...":"Submit Now"}</button></div></div></div>)}
    </div>
  );
}

// ── SHARED COMPONENTS ─────────────────────────────────────────────────────────
function PageWrap({ title, subtitle, action, children }) {
  return (
    <div style={{maxWidth:960,animation:"fadeIn .25s ease"}}>
      {(title||action)&&(
        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:24}}>
          <div><div style={{fontSize:20,fontWeight:800,color:"#f9fafb"}}>{title}</div>{subtitle&&<div style={{fontSize:13,color:"#374151",marginTop:2}}>{subtitle}</div>}</div>
          {action&&<div>{action}</div>}
        </div>
      )}
      {children}
    </div>
  );
}
function Field({ label, children }) { return <div style={{marginBottom:14}}><label style={{display:"block",fontSize:11,color:"#4b5563",textTransform:"uppercase",letterSpacing:".5px",marginBottom:6,fontWeight:700}}>{label}</label>{children}</div>; }
function Grid2({ children }) { return <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>{children}</div>; }
function SectionLabel({ children }) { return <div style={{fontSize:11,fontWeight:700,color:"#374151",textTransform:"uppercase",letterSpacing:"1px",marginBottom:10,marginTop:8}}>{children}</div>; }
function Empty({ text }) { return <div style={{color:"#374151",fontSize:14,padding:"28px 0",textAlign:"center",border:"1px dashed rgba(255,255,255,.06)",borderRadius:10}}>{text}</div>; }
function Loader() { return <div style={{display:"flex",alignItems:"center",justifyContent:"center",padding:"40px 0",gap:10,color:"#374151",fontSize:13}}><div style={{width:18,height:18,border:"2px solid rgba(99,102,241,.2)",borderTop:"2px solid #a78bfa",borderRadius:"50%",animation:"spin 1s linear infinite"}}/>Loading...</div>; }
function Badge({ label, color="gray" }) {
  const c={green:["rgba(34,197,94,.12)","#22c55e"],blue:["rgba(96,165,250,.12)","#60a5fa"],gray:["rgba(107,114,128,.15)","#6b7280"],red:["rgba(239,68,68,.12)","#ef4444"],yellow:["rgba(234,179,8,.12)","#eab308"],purple:["rgba(168,85,247,.12)","#a78bfa"]}[color]||["rgba(107,114,128,.15)","#6b7280"];
  return <span style={{background:c[0],color:c[1],borderRadius:5,padding:"2px 8px",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>{label}</span>;
}
function Btn({ children, onClick, primary, ghost, danger, disabled }) {
  let bg="rgba(255,255,255,.04)", border="1px solid rgba(255,255,255,.08)", color="#6b7280";
  if(primary){bg="linear-gradient(135deg,#6366f1,#8b5cf6)";border="none";color="#fff";}
  if(danger) {bg="rgba(239,68,68,.08)"; border="1px solid rgba(239,68,68,.15)"; color="#ef4444";}
  return <button disabled={disabled} style={{background:bg,border,borderRadius:7,padding:"8px 14px",color,fontWeight:600,fontSize:13,cursor:"pointer",display:"inline-flex",alignItems:"center",gap:5,opacity:disabled?.5:1,transition:"all .15s"}} onClick={onClick}>{children}</button>;
}

const Sty = {
  btn:     {background:"linear-gradient(135deg,#6366f1,#8b5cf6)",border:"none",borderRadius:8,padding:"9px 18px",color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer",display:"inline-flex",alignItems:"center",gap:6},
  btnGhost:{background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.08)",borderRadius:7,padding:"8px 14px",color:"#6b7280",fontWeight:600,fontSize:13,cursor:"pointer"},
  inp:     {width:"100%",background:"rgba(255,255,255,.05)",border:"1px solid rgba(255,255,255,.08)",borderRadius:8,padding:"10px 12px",color:"#f9fafb",fontSize:14,outline:"none",boxSizing:"border-box",fontFamily:"inherit"},
  chip:    {background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.07)",borderRadius:20,padding:"7px 14px",color:"#6b7280",cursor:"pointer",fontSize:13,display:"inline-flex",alignItems:"center",transition:"all .15s"},
  chipOn:  {background:"rgba(99,102,241,.15)",borderColor:"rgba(99,102,241,.35)",color:"#a78bfa"},
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
