async function sbFetch(method, table, query, body) {
  const url = SB_URL+"/rest/v1/"+table+(query?"?"+query:"");
  const opts = {method, headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":"application/json","Prefer":"return=representation"}};
  if(body!==undefined) opts.body=JSON.stringify(body);
  const res = await fetch(url,opts);
  const text = await res.text();
  if(!res.ok) throw new Error(text||res.statusText);
  if(!text||text==="null") return [];
  try{return JSON.parse(text);}catch{return [];}
}
const dbGet    = (t,q)   => sbFetch("GET",   t,q);
const dbInsert = (t,d)   => sbFetch("POST",  t,"",d);
const dbUpdate = (t,m,d) => sbFetch("PATCH", t,Object.entries(m).map(([k,v])=>k+"=eq."+encodeURIComponent(v)).join("&"),d);
const dbDelete = (t,m)   => sbFetch("DELETE",t,Object.entries(m).map(([k,v])=>k+"=eq."+encodeURIComponent(v)).join("&"));

function timeAgo(d) { const s=Math.floor((Date.now()-new Date(d))/1000); if(s<60)return s+"s ago"; if(s<3600)return Math.floor(s/60)+"m ago"; if(s<86400)return Math.floor(s/3600)+"h ago"; return Math.floor(s/86400)+"d ago"; }

// ── CONNECT CHECK ─────────────────────────────────────────────────────────────
function ConnectCheck({onReady}) {
  const [st,setSt]=useState("checking"); const [err,setErr]=useState("");
  async function check(){setSt("checking");setErr("");try{await dbGet("admin","select=id&limit=1");setSt("ok");setTimeout(()=>onReady(),500);}catch(e){setSt("error");setErr(e.message);}}
  useEffect(()=>{check();},[]);
  if(st==="ok") return <Center><div style={{fontSize:40}}>✅</div><div style={{color:"#22c55e",fontWeight:700,marginTop:8}}>Connected!</div></Center>;
  if(st==="checking") return <Center><div style={{width:36,height:36,border:"3px solid rgba(99,102,241,.2)",borderTop:"3px solid #a78bfa",borderRadius:"50%",animation:"spin 1s linear infinite"}}/><div style={{color:"#4b5563",fontSize:13,marginTop:12}}>Connecting...</div></Center>;
  return <Center><div style={{fontSize:36}}>❌</div><div style={{color:"#ef4444",fontWeight:700,fontSize:18,marginTop:8}}>Connection Failed</div><div style={{color:"#6b7280",fontSize:13,maxWidth:360,textAlign:"center",marginTop:8,lineHeight:1.7}}>{err}</div><button onClick={check} style={{...C.btn,marginTop:16}}>Retry</button></Center>;
}
function Center({children}){return <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:"#07070f",padding:24}}>{children}</div>;}

function App() {
  const [ready,setReady]=useState(false); const [session,setSession]=useState(null); const [screen,setScreen]=useState("home");

  if(!ready) return <ConnectCheck onReady={()=>setReady(true)}/>;
  if(session?.role==="admin")     return <AdminApp onLogout={logout}/>;
  if(session?.role==="candidate") return <CandidateApp user={session.user} onLogout={logout}/>;
  return (
    <div style={{minHeight:"100vh",background:"#07070f"}}>
      {screen==="home"      && <HomePage onAdmin={()=>setScreen("admin")} onCandidate={()=>setScreen("candidate")}/>}
      {screen==="admin"     && <LoginPage role="admin"     onBack={()=>setScreen("home")} onLogin={()=>setSession({role:"admin"})}/>}
      {screen==="candidate" && <LoginPage role="candidate" onBack={()=>setScreen("home")} onLogin={u=>setSession({role:"candidate",user:u})}/>}
    </div>
  );
}

// ── LOGIN ─────────────────────────────────────────────────────────────────────
function LoginPage({role,onBack,onLogin}) {
  const [u,setU]=useState(""); const [p,setP]=useState(""); const [err,setErr]=useState(""); const [loading,setLoading]=useState(false);
  async function submit(){
    setErr(""); setLoading(true);
    try{
      if(role==="admin"){const rows=await dbGet("admin","select=username,password");if(!rows?.length||!rows.find(r=>r.username===u&&r.password===p)){setErr("Wrong username or password.");setLoading(false);return;}onLogin();}
      else{const rows=await dbGet("candidates","select=*&username=eq."+encodeURIComponent(u));if(!rows?.length){setErr("No account found.");setLoading(false);return;}const m=rows.find(r=>r.password===p);if(!m){setErr("Wrong password.");setLoading(false);return;}onLogin({id:m.id,name:m.name,username:m.username,email:m.email});}
    }catch(e){setErr("Error: "+e.message);}
    setLoading(false);
  }
  return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",padding:24}}>
      <div style={{background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.08)",borderRadius:18,padding:36,width:"100%",maxWidth:380,animation:"fadeIn .3s ease"}}>

        <div style={{fontSize:24,fontWeight:800,color:"#f9fafb",marginBottom:3}}>{role==="admin"?"Admin Login":"Candidate Login"}</div>
        <div style={{fontSize:12,color:"#4b5563",marginBottom:24}}>{role==="candidate"?"Use credentials from your admin":"Enter admin credentials"}</div>
        <Fld label="Username"><input style={C.inp} value={u} autoFocus onChange={e=>setU(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()} placeholder="Username"/></Fld>
        <Fld label="Password"><input style={C.inp} type="password" value={p} onChange={e=>setP(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()} placeholder="Password"/></Fld>
        {err&&<div style={{color:"#ef4444",fontSize:13,padding:"8px 12px",background:"rgba(239,68,68,.08)",borderRadius:8,marginBottom:10}}>{err}</div>}
        <button style={{...C.btn,width:"100%",justifyContent:"center",marginTop:4}} onClick={submit} disabled={loading}>{loading?"Please wait...":"Login"}</button>
      </div>
    </div>
  );
}
